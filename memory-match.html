<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match тАФ PIXELZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Figtree:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0f;
  --s1:#131316;
  --s2:#1a1a1f;
  --s3:#222228;
  --s4:#2a2a32;
  --border:rgba(255,255,255,0.07);
  --accent:#e85d04;
  --accent-h:#ff6a1a;
  --text:#f0f0f5;
  --text2:#a0a0b0;
  --text3:#606070;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Figtree',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}

a.back{position:fixed;top:16px;left:16px;font-family:'Figtree',sans-serif;font-size:0.8rem;font-weight:600;color:var(--text2);text-decoration:none;letter-spacing:0.05em;z-index:100;transition:color .2s;display:flex;align-items:center;gap:6px}
a.back:hover{color:var(--text)}
a.back::before{content:'тЖР';font-size:1rem}

.coin-display{position:fixed;top:16px;right:16px;font-family:'Figtree',sans-serif;font-size:0.85rem;font-weight:700;color:var(--text);z-index:100;background:var(--s1);border:1px solid var(--border);padding:6px 14px;border-radius:20px}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.screen.hidden{display:none}

/* BUTTONS */
.btn{font-family:'Figtree',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.04em;padding:12px 28px;border-radius:8px;cursor:pointer;transition:all .15s;border:none;min-width:180px;text-align:center}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-secondary{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--s3);border-color:rgba(255,255,255,0.14)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* TITLE */
#title-screen .logo{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;color:var(--text);letter-spacing:-0.02em;margin-bottom:4px;text-align:center;line-height:1}
#title-screen .logo span{color:var(--accent)}
#title-screen .sub{font-size:0.8rem;font-weight:600;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:36px}

/* GAME */
#game-screen{justify-content:flex-start;padding-top:70px}
.game-hud{display:flex;gap:6px;margin-bottom:10px;align-items:stretch;flex-wrap:wrap;justify-content:center}
.hud-item{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:8px 18px;text-align:center;min-width:80px}
.hud-label{font-size:0.65rem;font-weight:700;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.08em}
.hud-val{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800}
.hud-score{color:var(--accent)}
.hud-level{color:var(--text)}
.hud-coins{color:#f5c518}
.hud-streak{color:#3ecf8e}

.timer-wrap{width:min(480px,90vw);height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-bottom:10px}
.timer-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .1s linear}

#combo-text{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:#f5c518;min-height:28px;text-align:center;margin-bottom:6px;letter-spacing:0.02em}

#card-grid{display:grid;gap:8px;justify-content:center}

/* CARDS */
.card{cursor:pointer;perspective:600px;position:relative}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;align-items:center;justify-content:center}
.card-back{background:var(--s1);border:1px solid var(--border)}
.card-back::after{content:'?';font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--text3)}
.card-front{background:var(--s2);border:1px solid rgba(255,255,255,0.1);transform:rotateY(180deg)}
.card.matched .card-front{border-color:rgba(232,93,4,0.5);background:rgba(232,93,4,0.08)}
.card.wrong .card-inner{animation:shake .3s ease}
@keyframes shake{0%,100%{transform:rotateY(180deg) translateX(0)}25%{transform:rotateY(180deg) translateX(-5px)}75%{transform:rotateY(180deg) translateX(5px)}}

/* LEVEL COMPLETE */
#level-complete{position:fixed;inset:0;background:rgba(12,12,15,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:50}
#level-complete.hidden{display:none}
#level-complete .lc-title{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:var(--text)}
#level-complete .lc-sub{font-size:1rem;font-weight:600;color:var(--text2)}

/* GAMEOVER */
#gameover-screen .go-title{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--accent);margin-bottom:4px;letter-spacing:-0.01em}
.result-box{background:var(--s1);border:1px solid var(--border);padding:20px 36px;border-radius:12px;margin-bottom:14px;width:min(340px,90vw)}
.result-row{display:flex;justify-content:space-between;align-items:center;gap:36px;margin-bottom:8px}
.result-row:last-child{margin-bottom:0}
.rl{font-size:0.8rem;font-weight:700;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase}
.rv{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text)}
.name-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px}
.name-label{font-size:0.75rem;font-weight:700;color:var(--text2);letter-spacing:0.1em;text-transform:uppercase}
input.name-inp{background:var(--s1);border:1px solid var(--border);color:var(--text);font-family:'Figtree',sans-serif;font-size:1rem;font-weight:700;padding:10px 16px;border-radius:8px;text-align:center;width:200px;outline:none;text-transform:uppercase;transition:border-color .15s}
input.name-inp:focus{border-color:var(--accent)}
input.name-inp::placeholder{color:var(--text3);text-transform:none;font-weight:500}

/* LEADERBOARD */
#lb-screen .lb-title{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--text);margin-bottom:20px;letter-spacing:-0.01em}
.lb-table{width:min(360px,90vw);border-collapse:collapse}
.lb-table th{font-size:0.7rem;font-weight:700;color:var(--text3);padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;text-transform:uppercase;letter-spacing:0.08em}
.lb-table td{font-size:0.95rem;font-weight:600;padding:10px 12px;border-bottom:1px solid var(--border)}
.lb-rank{color:var(--text3);width:32px}.lb-rank.gold{color:#f5c518}.lb-rank.silver{color:#c0c0c0}.lb-rank.bronze{color:#cd7f32}
.lb-name{color:var(--text)}.lb-score{color:var(--accent);text-align:right;font-family:'Syne',sans-serif;font-weight:800}
.lb-empty{text-align:center;padding:20px;color:var(--text3);font-size:0.85rem}

/* SHOP */
#shop-screen .shop-title{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-0.01em}
.shop-coins{font-size:0.85rem;font-weight:600;color:var(--text2);margin-bottom:20px}
.themes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;max-width:420px}
.theme-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s}
.theme-card:hover{border-color:rgba(255,255,255,0.14);background:var(--s2)}
.theme-card.selected{border-color:var(--accent);background:rgba(232,93,4,0.07)}
.theme-card.locked{opacity:0.6}
.theme-preview{font-size:1.2rem;margin-bottom:8px;line-height:1.5}
.theme-name{font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:700;color:var(--text);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.06em}
.theme-price{font-size:0.75rem;font-weight:700}
.theme-price.owned{color:#3ecf8e}.theme-price.cost{color:#f5c518}
</style>
</head>

<script>
var BIN_ID='69c8fa755fdde574550e49c0';
var BIN_KEY='$2a$10$xwN4exdBlvLZoIzDDvZClewvqjRkJpa7/onN2TbkOAOXoRWqdg0yu';
var BIN_URL='https://api.jsonbin.io/v3/b/'+BIN_ID;

function loadData(){try{return JSON.parse(localStorage.getItem('memory_data')||'null')||{coins:0,owned:[0],sel:0};}catch(e){return{coins:0,owned:[0],sel:0};}}
function saveData(d){try{localStorage.setItem('memory_data',JSON.stringify(d));}catch(e){}}
function loadLBLocal(){try{return JSON.parse(localStorage.getItem('memory_lb')||'[]');}catch(e){return[];}}
function saveLBLocal(d){try{localStorage.setItem('memory_lb',JSON.stringify(d));}catch(e){}}
function withTO(p,ms){return Promise.race([p,new Promise((_,rej)=>setTimeout(()=>rej(new Error('to')),ms))]);}
function fetchLB(){
  return withTO(fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':BIN_KEY}}).then(r=>r.json()).then(d=>{var lb=d.record;if(!Array.isArray(lb))lb=[];saveLBLocal(lb);return lb;}),4000).catch(()=>loadLBLocal());
}
function saveLBEntry(name,score){
  var lb=loadLBLocal();
  lb.push({name:name.toUpperCase().slice(0,12),score});
  lb.sort((a,b)=>b.score-a.score);lb=lb.slice(0,10);
  saveLBLocal(lb);
  withTO(fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},body:JSON.stringify(lb)}),4000).catch(()=>{});
}

var THEMES=[
  {
    name:'Standard',price:0,
    emojis:['ЁЯОо','ЁЯХ╣я╕П','ЁЯОп','ЁЯТО','тнР','ЁЯФе','ЁЯМЩ','ЁЯЪА','ЁЯО▓','ЁЯГП','ЁЯзй','ЁЯкД','ЁЯФС','ЁЯПЖ','ЁЯОк','ЁЯОн','ЁЯОи','ЁЯОм','ЁЯОд','ЁЯО╕','ЁЯжД','ЁЯРЙ','ЁЯдЦ','ЁЯС╛','ЁЯЫ╕','ЁЯНХ','ЁЯНж','ЁЯОБ','ЁЯОА','ЁЯУж','ЁЯТб','ЁЯФо','ЁЯМИ','тЪб','ЁЯОК']
  },
  {
    name:'Natur',price:30,
    emojis:['ЁЯМ╕','ЁЯМ┐','ЁЯжЛ','ЁЯНА','ЁЯМИ','ЁЯМ║','ЁЯМ┤','ЁЯМК','ЁЯНБ','ЁЯМ╗','ЁЯМ╖','ЁЯжК','ЁЯР╗','ЁЯР╝','ЁЯРи','ЁЯжБ','ЁЯРп','ЁЯжЕ','ЁЯжЙ','ЁЯРм','ЁЯРЩ','ЁЯжИ','ЁЯМ╡','ЁЯМЛ','ЁЯПФя╕П','ЁЯМ╛','ЁЯНД','ЁЯРЪ','ЁЯжА','ЁЯРа','ЁЯР╕','ЁЯжй','ЁЯМН','ЁЯМЮ','тЭДя╕П']
  },
  {
    name:'Essen',price:35,
    emojis:['ЁЯНХ','ЁЯНФ','ЁЯМо','ЁЯНЬ','ЁЯНг','ЁЯНж','ЁЯОВ','ЁЯНй','ЁЯНк','ЁЯНл','ЁЯН┐','ЁЯзБ','ЁЯН░','ЁЯез','ЁЯНн','ЁЯеР','ЁЯеи','ЁЯзА','ЁЯН│','ЁЯеЮ','ЁЯМп','ЁЯеЧ','ЁЯН▒','ЁЯНЫ','ЁЯеШ','ЁЯН▓','ЁЯлХ','ЁЯжЮ','ЁЯей','ЁЯНЧ','ЁЯНЦ','ЁЯМ╜','ЁЯзЖ','ЁЯеЩ','ЁЯлФ']
  },
  {
    name:'Sport',price:40,
    emojis:['тЪ╜','ЁЯПА','ЁЯПИ','тЪ╛','ЁЯО╛','ЁЯПР','ЁЯПЙ','ЁЯО▒','ЁЯПУ','ЁЯП╕','ЁЯеК','ЁЯеЛ','ЁЯд╕','ЁЯПД','ЁЯЪ┤','ЁЯПК','тЫ╖я╕П','ЁЯд║','ЁЯП╣','ЁЯОп','ЁЯЫ╣','ЁЯПЛя╕П','ЁЯд╝','ЁЯзЧ','ЁЯд╛','ЁЯПЗ','ЁЯеЕ','ЁЯО│','ЁЯПМя╕П','ЁЯО┐','ЁЯЫ╖','ЁЯеМ','ЁЯПТ','ЁЯд┐','ЁЯПЖ']
  },
  {
    name:'Reisen',price:45,
    emojis:['тЬИя╕П','ЁЯЪВ','ЁЯЪв','ЁЯПЦя╕П','ЁЯЧ╝','ЁЯЧ╜','ЁЯПп','ЁЯЧ║я╕П','ЁЯз│','ЁЯМН','ЁЯМО','ЁЯМП','ЁЯПФя╕П','ЁЯОб','ЁЯОв','ЁЯПЭя╕П','ЁЯЫдя╕П','ЁЯЪБ','ЁЯЪа','ЁЯЫ│я╕П','тЫ╡','ЁЯЪд','ЁЯЪ╡','ЁЯПХя╕П','ЁЯЧ╗','ЁЯПЬя╕П','ЁЯМЙ','ЁЯПЯя╕П','ЁЯХМ','тЫйя╕П','ЁЯОа','ЁЯМГ','ЁЯМЖ','ЁЯОС','ЁЯЫХ']
  }
];

var LEVELS=[
  {cols:4,rows:4,pairs:8,time:60},
  {cols:4,rows:5,pairs:10,time:70},
  {cols:5,rows:6,pairs:15,time:90},
  {cols:6,rows:6,pairs:18,time:100},
  {cols:6,rows:6,pairs:18,time:90},
  {cols:6,rows:6,pairs:18,time:80},
  {cols:6,rows:6,pairs:18,time:70},
];

var pdata=loadData();
var cards=[],flipped=[],matched=0,canFlip=true;
var score,level,streak,gameCoins,totalTime,timeLeft,timerInterval;
var running=false;

function updateCoinDisplay(){document.getElementById('coin-total').textContent=pdata.coins;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function showLB(){showScreen('lb-screen');fetchLB().then(renderLB);}
function showShop(){showScreen('shop-screen');renderShopUI();}

function getCardSize(){
  var lv=LEVELS[Math.min(level-1,LEVELS.length-1)];
  var maxW=Math.min(window.innerWidth-40,520);
  var maxH=window.innerHeight-200;
  var sz=Math.min(Math.floor((maxW-lv.cols*8)/lv.cols),Math.floor((maxH-lv.rows*8)/lv.rows),80);
  return Math.max(sz,48);
}

function startGame(){
  score=0;level=1;streak=0;gameCoins=0;running=true;
  showScreen('game-screen');
  startLevel();
}

function startLevel(){
  flipped=[];matched=0;canFlip=true;
  var lv=LEVELS[Math.min(level-1,LEVELS.length-1)];
  totalTime=lv.time;timeLeft=lv.time;
  updateHUD();
  buildGrid(lv);
  startTimer();
}

function buildGrid(lv){
  var theme=THEMES[pdata.sel];
  // Shuffle the full emoji pool and pick unique pairs
  var pool=theme.emojis.slice();
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  pool=pool.slice(0,lv.pairs);
  var arr=[...pool,...pool];
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  cards=arr;
  var grid=document.getElementById('card-grid');
  var sz=getCardSize();
  grid.style.gridTemplateColumns='repeat('+lv.cols+','+sz+'px)';
  grid.innerHTML='';
  arr.forEach(function(emoji,i){
    var el=document.createElement('div');
    el.className='card';
    el.style.width=sz+'px';el.style.height=sz+'px';
    el.innerHTML='<div class="card-inner"><div class="card-back"></div><div class="card-front" style="font-size:'+Math.floor(sz*0.45)+'px">'+emoji+'</div></div>';
    el.dataset.idx=i;el.dataset.emoji=emoji;
    el.addEventListener('click',function(){flipCard(this);});
    grid.appendChild(el);
  });
}

function flipCard(el){
  if(!canFlip||!running)return;
  if(el.classList.contains('flipped')||el.classList.contains('matched'))return;
  if(flipped.length>=2)return;
  el.classList.add('flipped');
  flipped.push(el);
  if(flipped.length===2)checkMatch();
}

function checkMatch(){
  canFlip=false;
  var a=flipped[0],b=flipped[1];
  if(a.dataset.emoji===b.dataset.emoji){
    setTimeout(()=>{
      a.classList.add('matched');b.classList.add('matched');
      streak++;
      var mult=Math.min(streak,4);
      var pts=100*mult;
      score+=pts;
      gameCoins=Math.floor(score/200);
      showCombo(mult);
      matched+=2;
      flipped=[];canFlip=true;
      updateHUD();
      if(matched>=cards.length)levelComplete();
    },300);
  } else {
    streak=0;
    setTimeout(()=>{
      a.classList.remove('flipped');b.classList.remove('flipped');
      a.classList.add('wrong');b.classList.add('wrong');
      setTimeout(()=>{a.classList.remove('wrong');b.classList.remove('wrong');},300);
      flipped=[];canFlip=true;
      updateHUD();
    },700);
  }
}

var comboTO=null;
function showCombo(mult){
  if(mult<=1)return;
  var el=document.getElementById('combo-text');
  el.textContent='COMBO x'+mult+'! +'+100*mult;
  if(comboTO)clearTimeout(comboTO);
  comboTO=setTimeout(()=>{el.textContent='';},1000);
}

function startTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(!running)return;
    timeLeft--;
    var pct=Math.max(0,(timeLeft/totalTime)*100);
    document.getElementById('timer-bar').style.width=pct+'%';
    if(timeLeft<=0){clearInterval(timerInterval);endGame();}
  },1000);
}

function levelComplete(){
  clearInterval(timerInterval);running=false;
  var bonus=timeLeft*10;
  score+=bonus;
  gameCoins=Math.floor(score/200);
  document.getElementById('lc-bonus').textContent='Zeitbonus: +'+bonus;
  document.getElementById('level-complete').classList.remove('hidden');
  setTimeout(()=>{
    document.getElementById('level-complete').classList.add('hidden');
    level++;running=true;
    startLevel();
  },2000);
}

function updateHUD(){
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-level').textContent=level;
  document.getElementById('hud-coins').textContent=gameCoins;
  document.getElementById('hud-streak').textContent='x'+Math.min(streak+1,4);
}

function endGame(){
  running=false;
  pdata.coins+=gameCoins;saveData(pdata);updateCoinDisplay();
  document.getElementById('res-score').textContent=score;
  document.getElementById('res-level').textContent=level;
  document.getElementById('res-coins').textContent=gameCoins;
  var lb=loadLBLocal();
  var top10=lb.length<10||score>(lb[lb.length-1]||{score:0}).score;
  document.getElementById('name-wrap').style.display=top10&&score>0?'flex':'none';
  showScreen('gameover-screen');
}

function submitScore(){
  var name=document.getElementById('name-inp').value.trim()||'AAA';
  saveLBEntry(name,score);
  document.getElementById('name-wrap').style.display='none';
}

function renderLB(lb){
  var m=['ЁЯеЗ','ЁЯеИ','ЁЯеЙ'];
  var h='<table class="lb-table"><thead><tr><th>#</th><th>Name</th><th>Punkte</th></tr></thead><tbody>';
  if(!lb.length)h+='<tr><td colspan="3" class="lb-empty">Noch keine Eintr├дge</td></tr>';
  lb.forEach((e,i)=>{h+='<tr><td class="lb-rank '+(i<3?['gold','silver','bronze'][i]:'')+'">'+(m[i]||i+1)+'</td><td class="lb-name">'+e.name+'</td><td class="lb-score">'+e.score+'</td></tr>';});
  h+='</tbody></table>';
  document.getElementById('lb-content').innerHTML=h;
}

function renderShopUI(){
  document.getElementById('shop-coins').textContent=pdata.coins;
  var h='';
  THEMES.forEach(function(t,i){
    var owned=pdata.owned.includes(i),sel=pdata.sel===i;
    h+='<div class="theme-card'+(sel?' selected':'')+(owned?'':' locked')+'" onclick="buyTheme('+i+')">';
    h+='<div class="theme-preview">'+t.emojis.slice(0,4).join('')+'</div>';
    h+='<div class="theme-name">'+t.name+'</div>';
    h+='<div class="theme-price '+(sel?'owned':owned?'owned':'cost')+'">'+(sel?'тЬУ Aktiv':owned?'W├дhlen':'ЁЯкЩ '+t.price)+'</div>';
    h+='</div>';
  });
  document.getElementById('themes-grid').innerHTML=h;
}

function buyTheme(i){
  var t=THEMES[i];
  if(pdata.owned.includes(i)){pdata.sel=i;saveData(pdata);renderShopUI();return;}
  if(pdata.coins>=t.price){pdata.coins-=t.price;pdata.owned.push(i);pdata.sel=i;saveData(pdata);renderShopUI();updateCoinDisplay();}
}

updateCoinDisplay();
</script>
</body>
</html>
