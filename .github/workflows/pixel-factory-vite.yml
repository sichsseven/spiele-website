# Baut games/pixel-factory-vite und committet dist/ (GitHub Pages nutzt statische Dateien im Repo).
name: Build Pixel Factory (Vite)

on:
  push:
    branches: [main]
    paths:
      - "games/pixel-factory-vite/**"
      - ".github/workflows/pixel-factory-vite.yml"
  workflow_dispatch:

concurrency:
  group: pixel-factory-vite-build
  cancel-in-progress: true

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: games/pixel-factory-vite/package-lock.json

      - name: Install and build
        working-directory: games/pixel-factory-vite
        run: npm ci && npm run build

      - name: Commit dist if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add games/pixel-factory-vite/dist
          if git diff --staged --quiet; then
            echo "No dist changes."
          else
            git commit -m "chore: build pixel-factory-vite dist"
            git push
          fi
