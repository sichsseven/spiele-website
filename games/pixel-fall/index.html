<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pixel Fall – PIXELZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="canvas"></canvas>

<!-- ── MENU ──────────────────────────────────────────── -->
<div id="screen-menu" class="screen versteckt">
  <div class="menu-card">
    <h1 class="game-title">PIXEL<br>FALL</h1>
    <div class="menu-user" id="menu-username">Spieler</div>
    <div class="menu-stats">
      <div class="stat-box">
        <div class="stat-label">BEST</div>
        <div class="stat-value" id="menu-best-score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">COINS</div>
        <div class="stat-value coin-value" id="menu-coins">0</div>
      </div>
    </div>
    <div class="menu-buttons">
      <button class="btn btn-primary" id="btn-spielen">▶ SPIELEN</button>
      <button class="btn btn-secondary" id="btn-shop">🎁 SKIN SHOP</button>
      <button class="btn btn-secondary" id="btn-rangliste">🏆 RANGLISTE</button>
      <button class="btn btn-logout" id="btn-logout">AUSLOGGEN</button>
    </div>
  </div>
</div>

<!-- ── GAME HUD ────────────────────────────────────────── -->
<div id="screen-game" class="screen versteckt">
  <div id="hud">
    <div id="hud-score">0</div>
    <div id="hud-coins">🪙 0</div>
  </div>
  <div id="banner" class="versteckt"></div>
</div>

<!-- ── GAME OVER ──────────────────────────────────────── -->
<div id="screen-gameover" class="screen versteckt">
  <div class="gameover-card">
    <h2 class="gameover-title">GAME OVER</h2>
    <div id="gameover-highscore-badge" class="highscore-badge versteckt">★ NEUER HIGHSCORE!</div>
    <div class="gameover-stats">
      <div class="stat-box">
        <div class="stat-label">SCORE</div>
        <div class="stat-value" id="gameover-score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">COINS</div>
        <div class="stat-value coin-value" id="gameover-coins">+0</div>
      </div>
    </div>
    <div class="gameover-buttons">
      <button class="btn btn-primary" id="btn-retry">▶ NOCHMAL</button>
      <button class="btn btn-secondary" id="btn-menu-from-gameover">HAUPTMENÜ</button>
    </div>
  </div>
</div>

<!-- ── SHOP ───────────────────────────────────────────── -->
<div id="screen-shop" class="screen versteckt">
  <div class="shop-header">
    <button class="btn-back" id="btn-shop-back">← ZURÜCK</button>
    <h2 class="shop-title">SKIN SHOP</h2>
    <div class="shop-coins" id="shop-coins-display">🪙 0</div>
  </div>
  <div class="lootbox-section">
    <div class="lootbox-visual" id="lootbox-visual">🎁</div>
    <div class="lootbox-result" id="lootbox-result"></div>
    <button class="btn btn-lootbox" id="btn-lootbox">BOX ÖFFNEN (100 🪙)</button>
  </div>
  <div class="skins-grid" id="skins-grid"></div>
</div>

<!-- ── LEADERBOARD ────────────────────────────────────── -->
<div id="screen-leaderboard" class="screen versteckt">
  <div class="leaderboard-header">
    <button class="btn-back" id="btn-leaderboard-back">← ZURÜCK</button>
    <h2 class="leaderboard-title">🏆 RANGLISTE</h2>
  </div>
  <div class="leaderboard-list" id="leaderboard-list">
    <div class="leaderboard-loading">Lade...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../auth.js"></script>
<script src="game.js"></script>
</body>
</html>
