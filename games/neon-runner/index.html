<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Runner — PIXELZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0f;--s1:#131316;--s2:#1a1a1f;--s3:#222228;--s4:#2c2c34;--border:rgba(255,255,255,0.07);--accent:#e85d04;--accent-h:#fb8c3a;--text:#f0f0f4;--text2:#9090a8;--text3:#52525e;--r:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Figtree',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;user-select:none}
a.back{position:fixed;top:14px;left:14px;font-family:'Figtree',sans-serif;font-weight:600;font-size:0.8rem;color:var(--text3);text-decoration:none;z-index:100;transition:color .15s}
a.back:hover{color:var(--text)}
.coins-hud{position:fixed;top:14px;right:14px;font-family:'Figtree',sans-serif;font-weight:700;font-size:0.85rem;color:var(--text2);z-index:100}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.screen.hidden{display:none}
.btn{font-family:'Figtree',sans-serif;font-weight:700;font-size:0.9rem;padding:12px 0;border-radius:8px;cursor:pointer;transition:all .15s;width:200px;text-align:center;border:none;letter-spacing:0.02em}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-secondary{background:var(--s2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--s3);color:var(--text)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
#title .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3rem);color:var(--text);letter-spacing:-0.02em;margin-bottom:4px}
#title .sub{font-family:'Figtree',sans-serif;font-size:0.8rem;font-weight:600;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:36px}
#game-screen{flex-direction:column}
.g-hud{display:flex;gap:28px;margin-bottom:8px;align-items:center}
.g-hud-item{text-align:center}
.g-hud-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:2px}
.g-hud-val{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;color:var(--text)}
.g-hud-val.orange{color:var(--accent-h)}
canvas#c{display:block;border:1px solid var(--border);border-radius:6px}
#gameover .go-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:var(--accent);letter-spacing:-0.02em;margin-bottom:20px}
.result-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px 40px;margin-bottom:14px;min-width:280px}
.result-row{display:flex;justify-content:space-between;gap:40px;margin-bottom:8px;align-items:center}
.result-row:last-child{margin-bottom:0}
.rl{font-size:0.85rem;font-weight:600;color:var(--text2)}.rv{font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;color:var(--text)}
.name-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px}
.name-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3)}
input.name-inp{background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:'Figtree',sans-serif;font-size:0.9rem;font-weight:600;padding:10px 16px;border-radius:8px;text-align:center;width:200px;outline:none;text-transform:uppercase;transition:border-color .15s}
input.name-inp:focus{border-color:var(--accent)}
#lb-screen .lb-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;color:var(--text);margin-bottom:20px}
.lb-table{width:320px;border-collapse:collapse}
.lb-table th{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);padding:8px;border-bottom:1px solid var(--border);text-align:left}
.lb-table td{font-family:'Figtree',sans-serif;font-size:0.9rem;font-weight:600;padding:8px;border-bottom:1px solid rgba(255,255,255,0.04)}
.lb-rank{color:var(--text3);width:32px}.lb-rank.g{color:#f0a500}.lb-rank.s{color:#a0a0b8}.lb-rank.b{color:#9a6a3a}
.lb-name{color:var(--text)}.lb-score{color:var(--accent-h);text-align:right;font-family:'Syne',sans-serif}
.lb-empty{text-align:center;padding:20px;color:var(--text3);font-size:0.8rem}
#shop-screen .shop-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;color:var(--text);margin-bottom:4px}
.shop-balance{font-size:0.8rem;font-weight:600;color:var(--text3);margin-bottom:20px}
.chars-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.char-card{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s}
.char-card:hover{border-color:rgba(255,255,255,0.14)}
.char-card.sel{border-color:rgba(232,93,4,0.5);background:rgba(232,93,4,0.05)}
.char-card.locked{opacity:0.45}
.char-preview{width:28px;height:28px;border-radius:4px;margin:0 auto 10px}
.char-name{font-size:0.72rem;font-weight:700;color:var(--text);margin-bottom:5px}
.char-price{font-size:0.72rem;font-weight:600}
.char-price.owned{color:#4ade80}.char-price.cost{color:var(--text2)}
</style>
</head>
<body>
<a href="../../index.html" class="back">← PIXELZONE</a>
<div class="coins-hud">🪙 <span id="coin-total">0</span></div>

<div class="screen" id="title">
  <div class="logo">Neon Runner</div>
  <div class="sub">// Pixelzone Arcade</div>
  <button class="btn btn-primary" onclick="startGame()">▶ Spielen</button>
  <button class="btn btn-secondary" onclick="showLB()">Rangliste</button>
  <button class="btn btn-secondary" onclick="showShop()">Shop</button>
</div>

<div class="screen hidden" id="game-screen">
  <div class="g-hud">
    <div class="g-hud-item"><div class="g-hud-label">Punkte</div><div class="g-hud-val orange" id="hud-score">0</div></div>
    <div class="g-hud-item"><div class="g-hud-label">Strecke</div><div class="g-hud-val" id="hud-dist">0m</div></div>
    <div class="g-hud-item"><div class="g-hud-label">Münzen</div><div class="g-hud-val" id="hud-coins">0</div></div>
    <div class="g-hud-item"><div class="g-hud-label">Streak</div><div class="g-hud-val" id="hud-streak">x1</div></div>
  </div>
  <canvas id="c"></canvas>
</div>

<div class="screen hidden" id="gameover">
  <div class="go-title">Game Over</div>
  <div class="result-box">
    <div class="result-row"><span class="rl">Punkte</span><span class="rv" id="res-score">0</span></div>
    <div class="result-row"><span class="rl">Strecke</span><span class="rv" id="res-dist">0m</span></div>
    <div class="result-row"><span class="rl">Münzen gesammelt</span><span class="rv" id="res-coins">0</span></div>
  </div>
  <div class="name-wrap" id="name-wrap">
    <div class="name-label">Name für Rangliste</div>
    <input class="name-inp" id="name-inp" maxlength="12" placeholder="DEIN NAME">
    <button class="btn btn-primary" onclick="submitScore()">Eintragen</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="startGame()">Nochmal</button>
    <button class="btn btn-secondary" onclick="showLB()">Rangliste</button>
    <button class="btn btn-secondary" onclick="showShop()">Shop</button>
  </div>
</div>

<div class="screen hidden" id="lb-screen">
  <div class="lb-title">🏆 Rangliste</div>
  <div id="lb-content"></div>
  <button class="btn btn-secondary" style="margin-top:18px" onclick="showScreen('title')">← Zurück</button>
</div>

<div class="screen hidden" id="shop-screen">
  <div class="shop-title">Shop</div>
  <div class="shop-balance">🪙 <span id="shop-coins">0</span> Münzen</div>
  <div class="chars-grid" id="chars-grid"></div>
  <button class="btn btn-secondary" onclick="showScreen('title')">← Zurück</button>
</div>

<script>
var BIN_ID='69c8fa7aed015c742bc8e429';
var BIN_KEY='$2a$10$xwN4exdBlvLZoIzDDvZClewvqjRkJpa7/onN2TbkOAOXoRWqdg0yu';
var BIN_URL='https://api.jsonbin.io/v3/b/'+BIN_ID;

function loadData(){try{return JSON.parse(localStorage.getItem('nr_data')||'null')||{coins:0,owned:[0],sel:0,bestDist:0};}catch(e){return{coins:0,owned:[0],sel:0,bestDist:0};}}
function saveData(d){try{localStorage.setItem('nr_data',JSON.stringify(d));}catch(e){}}
function loadLBLocal(){try{return JSON.parse(localStorage.getItem('nr_lb')||'[]');}catch(e){return[];}}
function saveLBLocal(d){try{localStorage.setItem('nr_lb',JSON.stringify(d));}catch(e){}}
function withTO(p,ms){return Promise.race([p,new Promise((_,rej)=>setTimeout(()=>rej(new Error('to')),ms))]);}
function fetchLB(){return withTO(fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':BIN_KEY}}).then(r=>r.json()).then(d=>{var lb=d.record;if(!Array.isArray(lb))lb=[];saveLBLocal(lb);return lb;}),4000).catch(()=>loadLBLocal());}
function saveLBEntry(name,score){var lb=loadLBLocal();lb.push({name:name.toUpperCase().slice(0,12),score});lb.sort((a,b)=>b.score-a.score);lb=lb.slice(0,10);saveLBLocal(lb);withTO(fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},body:JSON.stringify(lb)}),4000).catch(()=>{});}

var CHARS=[
  {name:'Standard',price:0,color:'#22d3ee',trail:'rgba(34,211,238,0.3)'},
  {name:'Schatten',price:30,color:'#a78bfa',trail:'rgba(167,139,250,0.3)'},
  {name:'Blaze',price:50,color:'#f97316',trail:'rgba(249,115,22,0.3)'},
  {name:'Specter',price:45,color:'#f0f0f4',trail:'rgba(240,240,244,0.25)'},
  {name:'Chrome',price:70,color:'#94a3b8',trail:'rgba(148,163,184,0.3)'},
  {name:'Phantom',price:90,color:'rainbow',trail:'rgba(255,255,255,0.2)'},
];

var pdata=loadData();
var canvas,ctx,CW,CH;
var player,obstacles,coins,particles,trailParts;
var score,dist,gameCoins,speed,running,frame,streak,streakTimer;
var gameLoop,finalScore;
var GROUND_Y;

function updateCoinDisplay(){document.getElementById('coin-total').textContent=pdata.coins;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function showLB(){showScreen('lb-screen');fetchLB().then(renderLB);}
function showShop(){showScreen('shop-screen');renderShopUI();}

function startGame(){
  showScreen('game-screen');
  canvas=document.getElementById('c');
  CW=Math.min(600,window.innerWidth-20);
  CH=Math.min(320,window.innerHeight-120);
  canvas.width=CW;canvas.height=CH;
  ctx=canvas.getContext('2d');
  GROUND_Y=CH-50;
  player={x:80,y:GROUND_Y,w:22,h:28,vy:0,jumps:0,maxJumps:2,ducking:false,coyote:0};
  obstacles=[];coins=[];particles=[];trailParts=[];
  score=0;dist=0;gameCoins=0;speed=4;running=true;frame=0;streak=0;streakTimer=0;
  updateHUD();
  if(gameLoop)cancelAnimationFrame(gameLoop);
  tick();
  // spawn initial coins/obstacles
  setTimeout(spawnLoop,1200);
}

function spawnLoop(){
  if(!running)return;
  spawnObstacle();
  setTimeout(spawnLoop,Math.max(800,1800-dist*0.5));
}

function spawnObstacle(){
  var t=Math.random();
  var patterns=[
    [{type:'low',h:24,gap:0}],
    [{type:'mid',h:40,gap:0}],
    [{type:'high',h:56,gap:0}],
    [{type:'hover',h:28,gap:80}],
    [{type:'low',h:20,gap:0},{type:'hover',h:24,gap:110}],
  ];
  var pat=patterns[Math.floor(Math.random()*Math.min(patterns.length,2+Math.floor(dist/200)))];
  pat.forEach(function(ob,i){
    var w=18+Math.random()*10;
    var h=ob.h;
    var y=ob.type==='hover'?GROUND_Y-ob.gap-h:GROUND_Y-h;
    obstacles.push({x:CW+20+i*80,y,w,h,type:ob.type,passed:false});
  });
  // spawn coin cluster
  if(Math.random()<0.5){
    var cx=CW+60+Math.random()*80;
    var cy=GROUND_Y-50-Math.random()*60;
    for(var i=0;i<3+Math.floor(Math.random()*4);i++)coins.push({x:cx+i*22,y:cy,r:7,collected:false});
  }
}

function tick(){
  if(!running)return;
  gameLoop=requestAnimationFrame(tick);
  frame++;
  update();
  draw();
}

function update(){
  speed=4+dist*0.003;
  dist+=speed/60;
  score=Math.floor(dist*10)+gameCoins*5;

  // streak
  streakTimer++;
  if(streakTimer>360)streak=Math.min(streak+1,4);
  else if(streakTimer>180)streak=Math.min(streak,2);

  // player physics
  if(!player.ducking){player.h=28;}
  else{player.h=16;}
  player.vy+=0.55;
  player.y+=player.vy;
  var gy=GROUND_Y-(player.ducking?16:28);
  if(player.y>=gy){player.y=gy;player.vy=0;player.jumps=0;player.coyote=6;}
  if(player.coyote>0)player.coyote--;

  // trail
  var ch=CHARS[pdata.sel];
  if(frame%3===0)trailParts.push({x:player.x,y:player.y,w:player.w,h:player.h,life:1,color:ch.color});
  for(var i=trailParts.length-1;i>=0;i--){trailParts[i].life-=0.15;if(trailParts[i].life<=0)trailParts.splice(i,1);}

  // obstacles
  for(var i=obstacles.length-1;i>=0;i--){
    var ob=obstacles[i];
    ob.x-=speed;
    if(ob.x+ob.w<0){obstacles.splice(i,1);continue;}
    // collision
    if(player.x+player.w-4>ob.x&&player.x+4<ob.x+ob.w&&player.y+player.h-2>ob.y&&player.y+2<ob.y+ob.h){
      endGame();return;
    }
    // passed — streak
    if(!ob.passed&&ob.x+ob.w<player.x){ob.passed=true;streakTimer=0;}
  }

  // coins
  for(var i=coins.length-1;i>=0;i--){
    var c=coins[i];
    c.x-=speed;
    if(!c.collected&&Math.abs(c.x-player.x-player.w/2)<c.r+player.w/2&&Math.abs(c.y-player.y-player.h/2)<c.r+player.h/2){
      c.collected=true;gameCoins++;
      spawnParts(c.x,c.y,'#fbbf24',5);
    }
    if(c.x<-20)coins.splice(i,1);
  }

  // particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.06;
    if(p.life<=0)particles.splice(i,1);
  }

  updateHUD();
}

function spawnParts(x,y,color,n){
  for(var i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*3,vy:-2-Math.random()*2,life:1,color});
}

function draw(){
  // sky gradient
  var grad=ctx.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0,'#0a0a12');grad.addColorStop(1,'#0e0e18');
  ctx.fillStyle=grad;ctx.fillRect(0,0,CW,CH);

  // background city silhouette
  ctx.fillStyle='#13131c';
  var bldgs=[[0,80,60,120],[70,50,50,150],[130,90,70,110],[210,40,40,160],[260,70,80,130],[350,30,50,170],[410,60,60,140],[480,85,55,115],[545,45,55,155]];
  bldgs.forEach(function(b){
    ctx.fillRect(b[0],CH-50-b[3],b[1],b[3]);
    // windows
    ctx.fillStyle='rgba(255,220,100,0.15)';
    for(var r=0;r<5;r++)for(var cc=0;cc<3;cc++){if(Math.random()>0.4)ctx.fillRect(b[0]+4+cc*16,CH-50-b[3]+8+r*18,8,10);}
    ctx.fillStyle='#13131c';
  });

  // perspective grid floor
  ctx.strokeStyle='rgba(34,211,238,0.08)';ctx.lineWidth=1;
  for(var i=0;i<12;i++){
    var x=((i/12)*CW+frame*speed*0.5)%CW;
    ctx.beginPath();ctx.moveTo(x,GROUND_Y);ctx.lineTo(CW/2,CH-10);ctx.stroke();
  }
  for(var y=GROUND_Y;y<CH;y+=10){
    var pr=(y-GROUND_Y)/(CH-GROUND_Y);
    ctx.beginPath();ctx.moveTo(CW/2-pr*CW*0.6,y);ctx.lineTo(CW/2+pr*CW*0.6,y);ctx.stroke();
  }

  // ground line
  ctx.strokeStyle='rgba(34,211,238,0.25)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GROUND_Y);ctx.lineTo(CW,GROUND_Y);ctx.stroke();

  // coins
  coins.filter(c=>!c.collected).forEach(c=>{
    ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });

  // obstacles
  obstacles.forEach(ob=>{
    var obColors={low:'#ef4444',mid:'#f97316',high:'#8b5cf6',hover:'#3b82f6'};
    ctx.fillStyle=obColors[ob.type]||'#ef4444';
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=6;
    ctx.fillRect(ob.x,ob.y,ob.w,ob.h);
    ctx.shadowBlur=0;
  });

  // trail
  trailParts.forEach(function(t){
    var ch=CHARS[pdata.sel];
    ctx.globalAlpha=t.life*0.35;
    ctx.fillStyle=ch.color==='rainbow'?('hsl('+(Date.now()/8%360)+',80%,60%)'):ch.color;
    ctx.fillRect(t.x,t.y,t.w,t.h);
    ctx.globalAlpha=1;
  });

  // particles
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);});
  ctx.globalAlpha=1;

  // player
  var ch=CHARS[pdata.sel];
  var pc=ch.color==='rainbow'?('hsl('+(Date.now()/5%360)+',80%,60%)'):ch.color;
  ctx.fillStyle=pc;
  ctx.shadowColor=pc;ctx.shadowBlur=10;
  ctx.fillRect(player.x,player.y,player.w,player.h);
  ctx.shadowBlur=0;
  // eyes
  ctx.fillStyle='#080810';
  ctx.fillRect(player.x+player.w-8,player.y+4,4,4);
  ctx.fillRect(player.x+player.w-8,player.y+11,4,4);

  // streak indicator
  if(streak>1){
    ctx.fillStyle='rgba(251,140,58,'+(0.6+streak*0.1)+')';
    ctx.font='bold 11px Syne,sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('STREAK x'+streak,10,10);
  }

  // new record flash
  if(dist>pdata.bestDist&&pdata.bestDist>0&&frame%60<30){
    ctx.fillStyle='rgba(232,93,4,0.7)';
    ctx.font='bold 12px Syne,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('NEUER REKORD!',CW/2,10);
  }
}

function updateHUD(){
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-dist').textContent=Math.floor(dist)+'m';
  document.getElementById('hud-coins').textContent=gameCoins;
  document.getElementById('hud-streak').textContent='x'+Math.max(1,streak);
}

function endGame(){
  running=false;cancelAnimationFrame(gameLoop);
  finalScore=score;
  pdata.coins+=gameCoins;
  if(Math.floor(dist)>pdata.bestDist)pdata.bestDist=Math.floor(dist);
  saveData(pdata);updateCoinDisplay();
  document.getElementById('res-score').textContent=score;
  document.getElementById('res-dist').textContent=Math.floor(dist)+'m';
  document.getElementById('res-coins').textContent=gameCoins;
  var lb=loadLBLocal();var top10=lb.length<10||score>(lb[lb.length-1]||{score:0}).score;
  document.getElementById('name-wrap').style.display=top10&&score>0?'flex':'none';
  showScreen('gameover');
}

function submitScore(){var name=document.getElementById('name-inp').value.trim()||'AAA';saveLBEntry(name,finalScore);document.getElementById('name-wrap').style.display='none';}

function jump(){
  if(player.jumps<player.maxJumps||(player.coyote>0&&player.jumps===0)){
    player.vy=-11;player.jumps++;player.coyote=0;
    spawnParts(player.x+player.w/2,player.y+player.h,CHARS[pdata.sel].color,4);
  }
}

function renderLB(lb){
  var m=['🥇','🥈','🥉'];
  var h='<table class="lb-table"><thead><tr><th>#</th><th>Name</th><th>Punkte</th></tr></thead><tbody>';
  if(!lb.length||lb.every(e=>e.score===0))h+='<tr><td colspan="3" class="lb-empty">Noch keine Einträge</td></tr>';
  else lb.filter(e=>e.score>0).forEach((e,i)=>{h+='<tr><td class="lb-rank '+(i<3?['g','s','b'][i]:'')+'">'+(m[i]||i+1)+'</td><td class="lb-name">'+e.name+'</td><td class="lb-score">'+e.score+'</td></tr>';});
  h+='</tbody></table>';document.getElementById('lb-content').innerHTML=h;
}

function renderShopUI(){
  document.getElementById('shop-coins').textContent=pdata.coins;
  var h='';
  CHARS.forEach((c,i)=>{
    var owned=pdata.owned.includes(i),sel=pdata.sel===i;
    var previewColor=c.color==='rainbow'?'linear-gradient(135deg,#f00,#ff0,#0f0,#0ff,#00f)':c.color;
    h+='<div class="char-card'+(sel?' sel':'')+(owned?'':' locked')+'" onclick="buyChar('+i+')">';
    h+='<div class="char-preview" style="background:'+previewColor+'"></div>';
    h+='<div class="char-name">'+c.name+'</div>';
    h+='<div class="char-price '+(sel?'owned':owned?'owned':'cost')+'">'+(sel?'Aktiv':owned?'✓ Wählen':'🪙 '+c.price)+'</div>';
    h+='</div>';
  });
  document.getElementById('chars-grid').innerHTML=h;
}

function buyChar(i){
  if(pdata.owned.includes(i)){pdata.sel=i;saveData(pdata);renderShopUI();return;}
  if(pdata.coins>=CHARS[i].price){pdata.coins-=CHARS[i].price;pdata.owned.push(i);pdata.sel=i;saveData(pdata);renderShopUI();updateCoinDisplay();}
}

document.addEventListener('keydown',function(e){
  if(e.key===' '||e.key==='ArrowUp'||e.key==='w'){e.preventDefault();if(running)jump();}
  if(e.key==='ArrowDown'||e.key==='s'){if(running)player.ducking=true;}
});
document.addEventListener('keyup',function(e){if(e.key==='ArrowDown'||e.key==='s')player.ducking=false;});
document.addEventListener('click',function(e){if(running&&e.target===canvas)jump();});

updateCoinDisplay();
</script>
</body>
</html>
