<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Blast – PIXELZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #f0f7ff;
  color: #1a1a2e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  user-select: none;
}

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.25rem; height: 54px;
  background: #fff;
  border-bottom: 1px solid #dceeff;
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.logo {
  display: flex; align-items: center; gap: .5rem;
  text-decoration: none; color: #1a1a2e; font-weight: 800; font-size: 1.1rem;
}
.logo-mark {
  width: 32px; height: 32px;
  background: #3a86ff; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
}
.nav-login-btn {
  padding: .4rem .9rem; background: #3a86ff; color: #fff;
  border-radius: 8px; text-decoration: none; font-weight: 700; font-size: .85rem;
}
.nav-user { display: flex; align-items: center; gap: .6rem; font-size: .9rem; }
.nav-username { font-weight: 700; color: #1a1a2e; }
.nav-logout-btn {
  padding: .3rem .7rem; background: #fee; color: #c0392b;
  border: 1px solid #fcc; border-radius: 6px;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .82rem; cursor: pointer;
}

/* ── GAME AREA ── */
.game-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1rem .5rem 1.5rem;
  gap: 1rem;
}

/* ── SCORE BAR ── */
.score-bar {
  display: flex; align-items: stretch; justify-content: center;
  gap: .75rem; width: 100%; max-width: 380px;
}
.score-item {
  flex: 1; text-align: center;
  background: #fff; border-radius: 12px;
  border: 1px solid #dceeff;
  padding: .6rem .5rem .5rem;
  box-shadow: 0 2px 8px rgba(58,134,255,.07);
}
.score-label {
  font-size: .6rem; font-weight: 800; letter-spacing: .1em;
  text-transform: uppercase; color: #9ab0cc; margin-bottom: 2px;
}
.score-val {
  font-size: 1.55rem; font-weight: 900; color: #1a1a2e;
  letter-spacing: -.03em; line-height: 1;
}
.score-val.highlight { color: #e67e22; }

/* ── GRID ── */
.grid-container {
  position: relative;
  background: #fff;
  border-radius: 16px;
  padding: 8px;
  box-shadow: 0 4px 20px rgba(58,134,255,.1), 0 0 0 1px #dceeff;
}
#grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  gap: 3px;
  width: min(360px, calc(100vw - 2rem));
  height: min(360px, calc(100vw - 2rem));
}
.cell {
  background: #eef3fb;
  border-radius: 5px;
  transition: background .08s;
}
.cell.filled { border-radius: 6px; }
.cell.preview-ok {
  opacity: .6 !important;
  border-radius: 6px;
}
.cell.preview-bad {
  background: rgba(220,50,50,.25) !important;
  border-radius: 6px;
}
.cell.flash {
  animation: cellFlash .3s ease-out forwards;
}
@keyframes cellFlash {
  0%   { filter: brightness(2.2) saturate(1.5); }
  100% { filter: brightness(1) saturate(1); }
}

/* ── PIECE TRAY ── */
.tray {
  display: flex; align-items: flex-end; justify-content: center;
  gap: .75rem;
  width: 100%; max-width: 380px;
  min-height: 110px;
}
.tray-slot {
  flex: 1; display: flex; align-items: center; justify-content: center;
  min-height: 100px;
  background: #fff;
  border-radius: 14px;
  border: 1px solid #dceeff;
  box-shadow: 0 2px 10px rgba(58,134,255,.07);
  cursor: grab;
  touch-action: none;
  position: relative;
  transition: opacity .2s, box-shadow .2s;
}
.tray-slot:active { cursor: grabbing; box-shadow: 0 6px 20px rgba(58,134,255,.18); }
.tray-slot.used { opacity: 0; pointer-events: none; }
.tray-slot.cant-fit { opacity: .3; cursor: not-allowed; }

.mini-grid {
  display: grid;
  gap: 2px;
  pointer-events: none;
}
.mini-cell {
  width: 15px; height: 15px;
  border-radius: 3px;
}

/* ── DRAG GHOST ── */
#ghost {
  position: fixed;
  pointer-events: none;
  z-index: 999;
  display: none;
  gap: 3px;
  opacity: .85;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,.2));
}
#ghost .ghost-cell { border-radius: 6px; }

/* ── SCORE POPUP ── */
.score-popup {
  position: fixed;
  font-size: 1.1rem; font-weight: 900;
  color: #e67e22;
  pointer-events: none;
  z-index: 998;
  text-shadow: 0 1px 4px rgba(0,0,0,.15);
  animation: popupFloat .85s ease-out forwards;
}
@keyframes popupFloat {
  0%   { opacity: 1; transform: translateY(0) translateX(-50%); }
  100% { opacity: 0; transform: translateY(-52px) translateX(-50%); }
}

/* ── GAME OVER ── */
#gameOverScreen {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: rgba(240,247,255,.82);
  backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
  padding: 1rem;
}
#gameOverScreen.show { display: flex; }
.go-card {
  background: #fff;
  border: 1px solid #dceeff;
  border-radius: 22px;
  padding: 2rem 2rem 1.75rem;
  width: 100%; max-width: 360px;
  text-align: center;
  box-shadow: 0 16px 48px rgba(58,134,255,.14);
  animation: goSlide .35s cubic-bezier(.34,1.2,.64,1);
}
@keyframes goSlide {
  from { opacity: 0; transform: scale(.85) translateY(30px); }
  to   { opacity: 1; transform: scale(1)  translateY(0); }
}
.go-title {
  font-size: 1.4rem; font-weight: 900;
  color: #1a1a2e; margin-bottom: .15rem;
}
.go-score {
  font-size: 3rem; font-weight: 900;
  color: #3a86ff; letter-spacing: -.04em;
  margin: .5rem 0 .1rem;
}
.go-hs { font-size: .82rem; font-weight: 700; color: #9ab0cc; margin-bottom: 1.25rem; }
.go-hs.new-record { color: #22c55e; }

.go-lb {
  background: #f4f9ff; border-radius: 12px;
  border: 1px solid #dceeff;
  padding: .75rem 1rem; margin-bottom: 1.25rem;
  text-align: left;
}
.go-lb-title {
  font-size: .62rem; font-weight: 900; letter-spacing: .1em;
  text-transform: uppercase; color: #9ab0cc; margin-bottom: .6rem;
}
.lb-row {
  display: flex; align-items: center; gap: .6rem;
  font-size: .88rem; font-weight: 700;
  padding: .25rem 0; color: #5a7aaa;
}
.lb-row.me { color: #3a86ff; }
.lb-rank { width: 1.4rem; font-size: .75rem; color: #b0ccf0; flex-shrink: 0; }
.lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-score { font-size: .82rem; }
.lb-empty { font-size: .8rem; color: #9ab0cc; font-weight: 600; }

.go-btn {
  display: inline-block; padding: .75rem 2.5rem;
  background: #3a86ff; color: #fff;
  border: none; border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: 1rem;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(58,134,255,.3);
  transition: opacity .15s, transform .15s;
}
.go-btn:hover { opacity: .9; transform: translateY(-2px); }

/* ── RESPONSIVE ── */
@media (max-width: 400px) {
  .mini-cell { width: 12px; height: 12px; }
  .tray { gap: .5rem; }
  .score-val { font-size: 1.3rem; }
}
@media (min-height: 750px) {
  .game-wrap { gap: 1.25rem; }
}
</style>
</head>
<body>

<header>
  <a href="../../index.html" class="logo">
    <div class="logo-mark">🕹</div>
    <span>PIXELZONE</span>
  </a>
  <div id="navAuth"><a href="../../login.html" class="nav-login-btn">Anmelden</a></div>
</header>

<div class="game-wrap">
  <!-- SCORE -->
  <div class="score-bar">
    <div class="score-item">
      <div class="score-label">Punkte</div>
      <div class="score-val" id="scoreDisp">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Bestleistung</div>
      <div class="score-val highlight" id="highscoreDisp">0</div>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid-container">
    <div id="grid"></div>
  </div>

  <!-- PIECE TRAY -->
  <div class="tray" id="tray">
    <div class="tray-slot" id="slot0"></div>
    <div class="tray-slot" id="slot1"></div>
    <div class="tray-slot" id="slot2"></div>
  </div>
</div>

<!-- DRAG GHOST -->
<div id="ghost"></div>

<!-- GAME OVER -->
<div id="gameOverScreen">
  <div class="go-card">
    <div class="go-title">Game Over</div>
    <div class="go-score" id="goScore">0</div>
    <div class="go-hs" id="goHs">Bestleistung: 0</div>
    <div class="go-lb">
      <div class="go-lb-title">Top 5</div>
      <div id="goLbList"><div class="lb-empty">Laden…</div></div>
    </div>
    <button class="go-btn" onclick="spielStart()">Nochmal spielen</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../auth.js"></script>
<script>PZ.pruefeSpielStatus('block-blast');</script>
<script>
'use strict';

// ── KONFIGURATION ─────────────────────────────────
const RASTER_SIZE = 8;

// Alle 31 Steinformen: z = [[reihe, spalte], ...]
const FORMEN = [
  // 1×1
  { z: [[0,0]], f: '#e74c3c' },
  // 1×2 Dominos
  { z: [[0,0],[0,1]], f: '#e67e22' },
  { z: [[0,0],[1,0]], f: '#e67e22' },
  // 1×3 Triominos
  { z: [[0,0],[0,1],[0,2]], f: '#f1c40f' },
  { z: [[0,0],[1,0],[2,0]], f: '#f1c40f' },
  // 2×2 Quadrat
  { z: [[0,0],[0,1],[1,0],[1,1]], f: '#3498db' },
  // L-Formen (4 Rotationen)
  { z: [[0,0],[1,0],[2,0],[2,1]], f: '#e74c3c' },
  { z: [[0,1],[1,1],[2,0],[2,1]], f: '#9b59b6' },
  { z: [[0,0],[0,1],[0,2],[1,0]], f: '#1abc9c' },
  { z: [[0,0],[0,1],[0,2],[1,2]], f: '#e91e8c' },
  { z: [[0,0],[1,0],[1,1],[1,2]], f: '#f39c12' },
  { z: [[0,2],[1,0],[1,1],[1,2]], f: '#6c5ce7' },
  // T-Formen (4 Rotationen)
  { z: [[0,0],[0,1],[0,2],[1,1]], f: '#9b59b6' },
  { z: [[0,1],[1,0],[1,1],[2,1]], f: '#e91e8c' },
  { z: [[0,1],[1,0],[1,1],[1,2]], f: '#1abc9c' },
  { z: [[0,0],[1,0],[1,1],[2,0]], f: '#f39c12' },
  // S/Z-Formen
  { z: [[0,1],[0,2],[1,0],[1,1]], f: '#e67e22' },
  { z: [[0,0],[0,1],[1,1],[1,2]], f: '#e74c3c' },
  { z: [[0,0],[1,0],[1,1],[2,1]], f: '#3498db' },
  { z: [[0,1],[1,0],[1,1],[2,0]], f: '#f1c40f' },
  // I-4
  { z: [[0,0],[0,1],[0,2],[0,3]], f: '#3498db' },
  { z: [[0,0],[1,0],[2,0],[3,0]], f: '#3498db' },
  // I-5
  { z: [[0,0],[0,1],[0,2],[0,3],[0,4]], f: '#6c5ce7' },
  { z: [[0,0],[1,0],[2,0],[3,0],[4,0]], f: '#6c5ce7' },
  // 3×3 Quadrat
  { z: [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2]], f: '#e67e22' },
  // 2×3 & 3×2
  { z: [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2]], f: '#1abc9c' },
  { z: [[0,0],[0,1],[1,0],[1,1],[2,0],[2,1]], f: '#f39c12' },
  // Ecken
  { z: [[0,0],[0,1],[1,0]], f: '#e91e8c' },
  { z: [[0,0],[0,1],[1,1]], f: '#9b59b6' },
  { z: [[0,0],[1,0],[1,1]], f: '#e74c3c' },
  { z: [[0,1],[1,0],[1,1]], f: '#f1c40f' },
];

// ── SPIELZUSTAND ─────────────────────────────────
let raster      = [];
let zellen      = [];
let stuecke     = [null, null, null];
let punkte      = 0;
let highscore   = 0;
let istAnimiert = false;
let istGameOver = false;

// ── DOM ──────────────────────────────────────────
const gridEl   = document.getElementById('grid');
const goScreen = document.getElementById('gameOverScreen');
const ghost    = document.getElementById('ghost');

// ── INIT ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  PZ.updateNavbar();
  highscore = parseInt(localStorage.getItem('bb_hs') || '0', 10);
  document.getElementById('highscoreDisp').textContent = highscore;
  spielStart();
});

function spielStart() {
  raster = Array.from({ length: RASTER_SIZE }, () => Array(RASTER_SIZE).fill(null));
  stuecke = [null, null, null];
  punkte = 0;
  istGameOver = false;
  istAnimiert = false;

  goScreen.classList.remove('show');
  punkteRendern();
  rasterRendern();
  neuePiecesGenerieren();
}

// ── RASTER ───────────────────────────────────────
function rasterRendern() {
  gridEl.innerHTML = '';
  zellen = Array.from({ length: RASTER_SIZE }, () => Array(RASTER_SIZE).fill(null));
  for (let r = 0; r < RASTER_SIZE; r++) {
    for (let c = 0; c < RASTER_SIZE; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      gridEl.appendChild(div);
      zellen[r][c] = div;
    }
  }
}

function zellFarbeSetzen(el, block) {
  if (block) {
    el.classList.add('filled');
    el.style.background = block.farbe;
    el.style.boxShadow  = `inset 0 2px 0 rgba(255,255,255,0.35), inset 0 -2px 0 rgba(0,0,0,0.12)`;
  } else {
    el.classList.remove('filled');
    el.style.background = '#eef3fb';
    el.style.boxShadow  = 'none';
  }
}

// ── PIECES ───────────────────────────────────────
function zufaelligesStueck() {
  const f = FORMEN[Math.floor(Math.random() * FORMEN.length)];
  return { zellen: f.z, farbe: f.f };
}

function neuePiecesGenerieren() {
  for (let i = 0; i < 3; i++) stuecke[i] = zufaelligesStueck();
  trayRendern();
  passFormPruefen();
}

function trayRendern() {
  for (let i = 0; i < 3; i++) {
    const slot = document.getElementById(`slot${i}`);
    slot.innerHTML = '';
    slot.classList.remove('used', 'cant-fit');
    const s = stuecke[i];
    if (!s) { slot.classList.add('used'); continue; }

    const rows = Math.max(...s.zellen.map(([r]) => r)) + 1;
    const cols = Math.max(...s.zellen.map(([, c]) => c)) + 1;
    const mg = document.createElement('div');
    mg.className = 'mini-grid';
    mg.style.gridTemplateColumns = `repeat(${cols}, 15px)`;
    mg.style.gridTemplateRows    = `repeat(${rows}, 15px)`;

    const occupied = new Set(s.zellen.map(([r, c]) => `${r},${c}`));
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const mc = document.createElement('div');
        mc.className = 'mini-cell';
        if (occupied.has(`${r},${c}`)) {
          mc.style.background = s.farbe;
          mc.style.boxShadow  = `inset 0 1px 0 rgba(255,255,255,0.35), inset 0 -1px 0 rgba(0,0,0,0.12)`;
        } else {
          mc.style.background = 'transparent';
        }
        mg.appendChild(mc);
      }
    }
    slot.appendChild(mg);
    slot.onpointerdown = (e) => dragStart(e, i);
  }
}

// ── KANN PASSEN? ─────────────────────────────────
function kannPassen(s) {
  for (let r0 = 0; r0 < RASTER_SIZE; r0++) {
    for (let c0 = 0; c0 < RASTER_SIZE; c0++) {
      if (s.zellen.every(([dr, dc]) => {
        const r = r0 + dr, c = c0 + dc;
        return r >= 0 && r < RASTER_SIZE && c >= 0 && c < RASTER_SIZE && !raster[r][c];
      })) return true;
    }
  }
  return false;
}

function passFormPruefen() {
  // Prüfe alle verbleibenden (nicht-null) Stücke
  const verbleibend = stuecke.filter(s => s !== null);

  // Wenn keine verbleiben (sollte nicht passieren), nichts tun
  if (verbleibend.length === 0) return;

  let nochMoeglich = false;
  for (let i = 0; i < 3; i++) {
    if (!stuecke[i]) continue;
    const slot = document.getElementById(`slot${i}`);
    if (kannPassen(stuecke[i])) {
      slot.classList.remove('cant-fit');
      nochMoeglich = true;
    } else {
      slot.classList.add('cant-fit');
    }
  }

  if (!nochMoeglich) {
    setTimeout(() => spielEnde(), 400);
  }
}

// ── ZELLGRÖSSE ───────────────────────────────────
function effZellGroesse() {
  const r0 = zellen[0][0].getBoundingClientRect();
  const r1 = zellen[0][1].getBoundingClientRect();
  return r1.left - r0.left;
}

// ── DRAG & DROP ───────────────────────────────────
let dragIdx   = -1;
let dragStueck = null;
let dragCS    = 0;

function dragStart(e, idx) {
  if (istAnimiert || istGameOver) return;
  const slot = document.getElementById(`slot${idx}`);
  if (slot.classList.contains('cant-fit') || slot.classList.contains('used')) return;

  e.preventDefault();
  dragIdx    = idx;
  dragStueck = stuecke[idx];
  dragCS     = effZellGroesse();

  const s    = dragStueck;
  const rows = Math.max(...s.zellen.map(([r]) => r)) + 1;
  const cols = Math.max(...s.zellen.map(([, c]) => c)) + 1;

  ghost.innerHTML = '';
  ghost.style.display = 'grid';
  ghost.style.gridTemplateColumns = `repeat(${cols}, ${dragCS}px)`;
  ghost.style.gridTemplateRows    = `repeat(${rows}, ${dragCS}px)`;
  ghost.style.gap   = '3px';
  ghost.style.width  = `${cols * dragCS + (cols - 1) * 3}px`;
  ghost.style.height = `${rows * dragCS + (rows - 1) * 3}px`;

  const occupied = new Set(s.zellen.map(([r, c]) => `${r},${c}`));
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const gc = document.createElement('div');
      gc.className = 'ghost-cell';
      gc.style.width  = `${dragCS}px`;
      gc.style.height = `${dragCS}px`;
      if (occupied.has(`${r},${c}`)) {
        gc.style.background = s.farbe;
        gc.style.boxShadow  = `inset 0 2px 0 rgba(255,255,255,0.35), inset 0 -2px 0 rgba(0,0,0,0.12)`;
      } else {
        gc.style.background = 'transparent';
      }
      ghost.appendChild(gc);
    }
  }

  ghostPositionieren(e.clientX, e.clientY);

  document.addEventListener('pointermove', dragMove);
  document.addEventListener('pointerup',   dragEnd);
  document.addEventListener('pointercancel', dragAbort);
}

function ghostPositionieren(cx, cy) {
  const s    = dragStueck;
  const rows = Math.max(...s.zellen.map(([r]) => r)) + 1;
  const cols = Math.max(...s.zellen.map(([, c]) => c)) + 1;
  const w    = cols * dragCS + (cols - 1) * 3;
  const h    = rows * dragCS + (rows - 1) * 3;
  ghost.style.left = `${cx - w / 2}px`;
  ghost.style.top  = `${cy - h - dragCS * 1.5}px`;
}

let vorschauZellen = [];

function vorschauLoeschen() {
  vorschauZellen.forEach(([r, c]) => {
    const el = zellen[r][c];
    el.classList.remove('preview-ok', 'preview-bad');
    zellFarbeSetzen(el, raster[r][c]);
  });
  vorschauZellen = [];
}

function rasterPosBerechnen(cx, cy) {
  const ref  = zellen[0][0].getBoundingClientRect();
  const cs   = dragCS;
  const s    = dragStueck;
  const rows = Math.max(...s.zellen.map(([r]) => r)) + 1;
  const cols = Math.max(...s.zellen.map(([, c]) => c)) + 1;
  const w    = cols * cs + (cols - 1) * 3;

  const pieceLeft = cx - w / 2;
  const pieceTop  = cy - (rows * cs + (rows - 1) * 3) - cs * 1.5;

  const c0 = Math.round((pieceLeft - ref.left) / cs);
  const r0 = Math.round((pieceTop  - ref.top)  / cs);
  return { r0, c0 };
}

function dragMove(e) {
  if (!dragStueck) return;
  ghostPositionieren(e.clientX, e.clientY);
  vorschauLoeschen();

  const { r0, c0 } = rasterPosBerechnen(e.clientX, e.clientY);
  const s = dragStueck;

  const gueltig = s.zellen.every(([dr, dc]) => {
    const r = r0 + dr, c = c0 + dc;
    return r >= 0 && r < RASTER_SIZE && c >= 0 && c < RASTER_SIZE && !raster[r][c];
  });

  s.zellen.forEach(([dr, dc]) => {
    const r = r0 + dr, c = c0 + dc;
    if (r < 0 || r >= RASTER_SIZE || c < 0 || c >= RASTER_SIZE) return;
    const el = zellen[r][c];
    if (gueltig) {
      el.classList.add('preview-ok');
      el.style.background = s.farbe;
      el.style.boxShadow  = 'none';
    } else {
      el.classList.add('preview-bad');
    }
    vorschauZellen.push([r, c]);
  });
}

async function dragEnd(e) {
  if (!dragStueck) return;
  document.removeEventListener('pointermove', dragMove);
  document.removeEventListener('pointerup',   dragEnd);
  document.removeEventListener('pointercancel', dragAbort);

  vorschauLoeschen();
  ghost.style.display = 'none';

  const { r0, c0 } = rasterPosBerechnen(e.clientX, e.clientY);
  const s = dragStueck;

  const gueltig = s.zellen.every(([dr, dc]) => {
    const r = r0 + dr, c = c0 + dc;
    return r >= 0 && r < RASTER_SIZE && c >= 0 && c < RASTER_SIZE && !raster[r][c];
  });

  const idx = dragIdx;
  dragIdx    = -1;
  dragStueck = null;

  if (gueltig) await steinSetzen(idx, r0, c0);
}

function dragAbort() {
  document.removeEventListener('pointermove', dragMove);
  document.removeEventListener('pointerup',   dragEnd);
  document.removeEventListener('pointercancel', dragAbort);
  vorschauLoeschen();
  ghost.style.display = 'none';
  dragIdx    = -1;
  dragStueck = null;
}

// ── STEIN SETZEN ─────────────────────────────────
async function steinSetzen(idx, r0, c0) {
  if (istAnimiert) return;
  const s = stuecke[idx];

  s.zellen.forEach(([dr, dc]) => {
    const r = r0 + dr, c = c0 + dc;
    raster[r][c] = { farbe: s.farbe };
    zellFarbeSetzen(zellen[r][c], raster[r][c]);
  });

  punkte += s.zellen.length;
  scorePopup(s.zellen.length, r0, c0);

  stuecke[idx] = null;
  document.getElementById(`slot${idx}`).classList.add('used');

  await linienLoeschen(r0, c0);

  if (stuecke.every(s => s === null)) {
    neuePiecesGenerieren();
  } else {
    passFormPruefen();
  }

  punkteRendern();
}

// ── LINIEN LÖSCHEN ────────────────────────────────
async function linienLoeschen(platzR, platzC) {
  const volleReihen  = [];
  const volleSpalten = [];

  for (let r = 0; r < RASTER_SIZE; r++) {
    if (raster[r].every(b => b !== null)) volleReihen.push(r);
  }
  for (let c = 0; c < RASTER_SIZE; c++) {
    if (raster.every(row => row[c] !== null)) volleSpalten.push(c);
  }
  if (volleReihen.length === 0 && volleSpalten.length === 0) return;

  istAnimiert = true;

  const betroffen = new Set();
  volleReihen.forEach(r => {
    for (let c = 0; c < RASTER_SIZE; c++) betroffen.add(`${r},${c}`);
  });
  volleSpalten.forEach(c => {
    for (let r = 0; r < RASTER_SIZE; r++) betroffen.add(`${r},${c}`);
  });

  betroffen.forEach(key => {
    const [r, c] = key.split(',').map(Number);
    zellen[r][c].classList.add('flash');
  });

  await new Promise(res => setTimeout(res, 300));

  betroffen.forEach(key => {
    const [r, c] = key.split(',').map(Number);
    zellen[r][c].classList.remove('flash');
    raster[r][c] = null;
    zellFarbeSetzen(zellen[r][c], null);
  });

  const gesamtLinien = volleReihen.length + volleSpalten.length;
  let liniePunkte    = betroffen.size * 2;
  if (gesamtLinien >= 4)      liniePunkte += gesamtLinien * 40;
  else if (gesamtLinien >= 2) liniePunkte += gesamtLinien * 20;

  punkte += liniePunkte;
  scorePopup(liniePunkte, platzR, platzC, true);
  punkteRendern();

  istAnimiert = false;
}

// ── PUNKTE ───────────────────────────────────────
function punkteRendern() {
  document.getElementById('scoreDisp').textContent = punkte;
  if (punkte > highscore) {
    highscore = punkte;
    localStorage.setItem('bb_hs', highscore);
    document.getElementById('highscoreDisp').textContent = highscore;
  }
}

function scorePopup(n, r, c, linie = false) {
  const ref = zellen[Math.min(r, RASTER_SIZE - 1)][Math.min(c, RASTER_SIZE - 1)].getBoundingClientRect();
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = `+${n}`;
  popup.style.left = `${ref.left + ref.width / 2}px`;
  popup.style.top  = `${ref.top + window.scrollY}px`;
  if (linie) popup.style.color = '#22c55e';
  document.body.appendChild(popup);
  popup.addEventListener('animationend', () => popup.remove());
}

// ── GAME OVER ─────────────────────────────────────
async function spielEnde() {
  istGameOver = true;
  goScreen.classList.add('show');
  document.getElementById('goScore').textContent = punkte;

  const isNeu = punkte > 0 && punkte >= highscore;
  const hsEl  = document.getElementById('goHs');
  hsEl.textContent = isNeu ? '🎉 Neue Bestleistung!' : `Bestleistung: ${highscore}`;
  hsEl.className   = `go-hs${isNeu ? ' new-record' : ''}`;

  let nutzername = null;
  try {
    const { data: { user } } = await PZ.supabase.auth.getUser();
    if (user) {
      await PZ.saveGameData('block-blast', punkte, 1, {});
      const { data } = await PZ.supabase
        .from('spieler_profile')
        .select('benutzername')
        .eq('id', user.id)
        .single();
      if (data) nutzername = data.benutzername;
    }
  } catch (_) {}

  const lbEl = document.getElementById('goLbList');
  try {
    const lb = await PZ.getLeaderboard('block-blast', 5);
    if (!lb || lb.length === 0) {
      lbEl.innerHTML = '<div class="lb-empty">Noch keine Einträge</div>';
    } else {
      lbEl.innerHTML = lb.map((e, i) => {
        const istIch = nutzername && e.benutzername === nutzername;
        const medal  = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}.`;
        return `<div class="lb-row${istIch ? ' me' : ''}">
          <span class="lb-rank">${medal}</span>
          <span class="lb-name">${e.benutzername || 'Unbekannt'}</span>
          <span class="lb-score">${e.punkte ?? e.score ?? 0}</span>
        </div>`;
      }).join('');
    }
  } catch (_) {
    lbEl.innerHTML = '<div class="lb-empty">Keine Verbindung</div>';
  }
}
