<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Block Blast – PIXELZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="bb-page">

<header class="site-header">
  <a href="../../index.html" class="logo">
    <div class="logo-mark">🕹</div>
    <span>PIXELZONE</span>
  </a>
  <div id="navAuth"><a href="../../login.html" class="nav-login-btn">Anmelden</a></div>
</header>

<main class="game-wrap">
  <section class="bb-scoreboard" aria-label="Punkte">
    <div class="bb-hs">
      <span class="bb-crown" aria-hidden="true">👑</span>
      <span class="bb-hs-val" id="highscoreDisp">0</span>
    </div>
    <div class="bb-center">
      <div class="bb-score-big" id="scoreDisp">0</div>
      <div class="bb-combo" id="comboDisp">×1</div>
    </div>
    <button type="button" class="bb-restart" id="btnNeustart" title="Neustart" aria-label="Neustart">↻</button>
  </section>

  <section class="board-wrap" aria-label="Spielfeld">
    <canvas id="boardCanvas" width="320" height="320" aria-label="8×8 Raster"></canvas>
  </section>

  <section class="tray" id="tray" aria-label="Steinauswahl">
    <div class="tray-slot" id="slot0" data-slot="0"></div>
    <div class="tray-slot" id="slot1" data-slot="1"></div>
    <div class="tray-slot" id="slot2" data-slot="2"></div>
  </section>

  <aside class="debug-panel versteckt" id="debugPanel" aria-live="polite">
    <div class="debug-title">Debug (D)</div>
    <pre id="debugText" class="debug-pre"></pre>
  </aside>
</main>

<div id="ghost"></div>

<div id="gameOverScreen">
  <div class="go-card">
    <div class="go-title">Keine Züge mehr</div>
    <div class="go-score" id="goScore">0</div>
    <div class="go-hs" id="goHs">Bestleistung: 0</div>
    <div class="go-lb">
      <div class="go-lb-title">Top 5</div>
      <div id="goLbList"><div class="lb-empty">Laden…</div></div>
    </div>
    <button type="button" class="go-btn" id="btnNochmal">Nochmal spielen</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../auth.js"></script>
<script>PZ.pruefeSpielStatus('block-blast');</script>
<script src="game.js"></script>
</body>
</html>
