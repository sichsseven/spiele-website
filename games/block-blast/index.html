<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Blast – PIXELZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="../../index.html" class="logo">
    <div class="logo-mark">🕹</div>
    <span>PIXELZONE</span>
  </a>
  <div id="navAuth"><a href="../../login.html" class="nav-login-btn">Anmelden</a></div>
</header>

<main class="game-wrap">
  <section class="score-bar" aria-label="Punktestand">
    <div class="score-item">
      <div class="score-icon">👑</div>
      <div class="score-val" id="scoreDisp">0</div>
    </div>
    <div class="score-item">
      <div class="score-icon">🏆</div>
      <div class="score-val" id="highscoreDisp">0</div>
    </div>
  </section>
  <section class="grid-container" aria-label="Spielfeld">
    <div id="grid"></div>
  </section>
  <section class="tray" id="tray" aria-label="Steinauswahl">
    <div class="tray-slot" id="slot0"></div>
    <div class="tray-slot" id="slot1"></div>
    <div class="tray-slot" id="slot2"></div>
  </section>
</main>

<div id="ghost"></div>

<div id="gameOverScreen">
  <div class="go-card">
    <div class="go-title">Game Over</div>
    <div class="go-score" id="goScore">0</div>
    <div class="go-hs" id="goHs">Bestleistung: 0</div>
    <div class="go-lb">
      <div class="go-lb-title">Top 5</div>
      <div id="goLbList"><div class="lb-empty">Laden…</div></div>
    </div>
    <button class="go-btn" onclick="spielStart()">Nochmal spielen</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../auth.js"></script>
<script>PZ.pruefeSpielStatus('block-blast');</script>
<script src="game.js"></script>
</body>
</html>
