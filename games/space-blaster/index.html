<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Blaster — PIXELZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0f;--s1:#131316;--s2:#1a1a1f;--s3:#222228;--s4:#2c2c34;--border:rgba(255,255,255,0.07);--accent:#e85d04;--accent-h:#fb8c3a;--text:#f0f0f4;--text2:#9090a8;--text3:#52525e;--r:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Figtree',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;user-select:none}
a.back{position:fixed;top:14px;left:14px;font-family:'Figtree',sans-serif;font-weight:600;font-size:0.8rem;color:var(--text3);text-decoration:none;z-index:100;transition:color .15s}
a.back:hover{color:var(--text)}
.coins-hud{position:fixed;top:14px;right:14px;font-family:'Figtree',sans-serif;font-weight:700;font-size:0.85rem;color:var(--text2);z-index:100}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.screen.hidden{display:none}

/* BUTTONS */
.btn{font-family:'Figtree',sans-serif;font-weight:700;font-size:0.9rem;padding:12px 0;border-radius:8px;cursor:pointer;transition:all .15s;width:200px;text-align:center;border:none;letter-spacing:0.02em}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-secondary{background:var(--s2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--s3);color:var(--text)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* TITLE */
#title .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3rem);color:var(--text);letter-spacing:-0.02em;margin-bottom:4px}
#title .sub{font-family:'Figtree',sans-serif;font-size:0.8rem;font-weight:600;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:36px}

/* GAME */
#game-screen{flex-direction:column}
.g-hud{display:flex;gap:32px;margin-bottom:10px;align-items:center}
.g-hud-item{text-align:center}
.g-hud-label{font-family:'Figtree',sans-serif;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:2px}
.g-hud-val{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;color:var(--text)}
.g-hud-val.orange{color:var(--accent-h)}
.lives{display:flex;gap:4px;justify-content:center}
.life{width:10px;height:10px;background:var(--accent);border-radius:50%}
.life.lost{background:var(--s3)}
.pw-bar{font-family:'Figtree',sans-serif;font-size:0.72rem;font-weight:700;color:var(--accent-h);min-height:18px;letter-spacing:0.04em;margin-bottom:4px;text-align:center}
canvas#c{display:block;border:1px solid var(--border);border-radius:6px}

/* GAMEOVER */
#gameover .go-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:var(--accent);letter-spacing:-0.02em;margin-bottom:6px}
#gameover .wave-reached{font-family:'Figtree',sans-serif;font-weight:600;font-size:0.85rem;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:20px}
.result-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px 40px;margin-bottom:14px;min-width:280px}
.result-row{display:flex;justify-content:space-between;gap:40px;margin-bottom:8px;align-items:center}
.result-row:last-child{margin-bottom:0}
.rl{font-size:0.85rem;font-weight:600;color:var(--text2)}
.rv{font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;color:var(--text)}
.name-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px}
.name-label{font-family:'Figtree',sans-serif;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3)}
input.name-inp{background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:'Figtree',sans-serif;font-size:0.9rem;font-weight:600;padding:10px 16px;border-radius:8px;text-align:center;width:200px;outline:none;text-transform:uppercase;transition:border-color .15s}
input.name-inp:focus{border-color:var(--accent)}

/* LB */
#lb-screen .lb-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;color:var(--text);margin-bottom:20px}
.lb-table{width:320px;border-collapse:collapse}
.lb-table th{font-family:'Figtree',sans-serif;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);padding:8px;border-bottom:1px solid var(--border);text-align:left}
.lb-table td{font-family:'Figtree',sans-serif;font-size:0.9rem;font-weight:600;padding:8px;border-bottom:1px solid rgba(255,255,255,0.04)}
.lb-rank{color:var(--text3);width:32px}.lb-rank.g{color:#f0a500}.lb-rank.s{color:#a0a0b8}.lb-rank.b{color:#9a6a3a}
.lb-name{color:var(--text)}.lb-score{color:var(--accent-h);text-align:right;font-family:'Syne',sans-serif}
.lb-empty{text-align:center;padding:20px;color:var(--text3);font-size:0.8rem}

/* SHOP */
#shop-screen .shop-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;color:var(--text);margin-bottom:4px}
.shop-balance{font-family:'Figtree',sans-serif;font-size:0.8rem;font-weight:600;color:var(--text3);margin-bottom:20px}
.ships-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.ship-card{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s}
.ship-card:hover{border-color:rgba(255,255,255,0.14)}
.ship-card.sel{border-color:rgba(232,93,4,0.5);background:rgba(232,93,4,0.05)}
.ship-card.locked{opacity:0.45}
.ship-preview{width:44px;height:44px;margin:0 auto 10px;position:relative}
.ship-name{font-family:'Figtree',sans-serif;font-size:0.72rem;font-weight:700;color:var(--text);margin-bottom:5px}
.ship-price{font-family:'Figtree',sans-serif;font-size:0.72rem;font-weight:600}
.ship-price.owned{color:#4ade80}.ship-price.cost{color:var(--text2)}
</style>
</head>
<body>
<a href="../../index.html" class="back">← PIXELZONE</a>
<div class="coins-hud">🪙 <span id="coin-total">0</span></div>

<div class="screen" id="title">
  <div class="logo">Space Blaster</div>
  <div class="sub">// Pixelzone Arcade</div>
  <button class="btn btn-primary" onclick="startGame()">▶ Spielen</button>
  <button class="btn btn-secondary" onclick="showLB()">Rangliste</button>
  <button class="btn btn-secondary" onclick="showShop()">Shop</button>
</div>

<div class="screen hidden" id="game-screen">
  <div class="g-hud">
    <div class="g-hud-item"><div class="g-hud-label">Punkte</div><div class="g-hud-val orange" id="hud-score">0</div></div>
    <div class="g-hud-item"><div class="g-hud-label">Welle</div><div class="g-hud-val" id="hud-wave">1</div></div>
    <div class="g-hud-item"><div class="g-hud-label">Leben</div><div class="lives" id="hud-lives"></div></div>
    <div class="g-hud-item"><div class="g-hud-label">Münzen</div><div class="g-hud-val" id="hud-coins">0</div></div>
  </div>
  <div class="pw-bar" id="pw-bar"></div>
  <canvas id="c"></canvas>
</div>

<div class="screen hidden" id="gameover">
  <div class="go-title">Game Over</div>
  <div class="wave-reached" id="wave-reached">Welle 1 erreicht</div>
  <div class="result-box">
    <div class="result-row"><span class="rl">Punkte</span><span class="rv" id="res-score">0</span></div>
    <div class="result-row"><span class="rl">Welle</span><span class="rv" id="res-wave">1</span></div>
    <div class="result-row"><span class="rl">Münzen verdient</span><span class="rv" id="res-coins">0</span></div>
  </div>
  <div id="login-hint" style="display:none;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px;">
    <div style="font-size:0.78rem;font-weight:700;color:var(--text3);">Score wird nicht gespeichert</div>
    <a href="../../login.html" class="btn btn-secondary" style="text-decoration:none;">🔒 Anmelden um Score zu speichern</a>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="startGame()">Nochmal</button>
    <button class="btn btn-secondary" onclick="showLB()">Rangliste</button>
    <button class="btn btn-secondary" onclick="showShop()">Shop</button>
  </div>
</div>

<div class="screen hidden" id="lb-screen">
  <div class="lb-title">🏆 Rangliste</div>
  <div id="lb-content"></div>
  <button class="btn btn-secondary" style="margin-top:18px" onclick="showScreen('title')">← Zurück</button>
</div>

<div class="screen hidden" id="shop-screen">
  <div class="shop-title">Shop</div>
  <div class="shop-balance">🪙 <span id="shop-coins">0</span> Münzen</div>
  <div class="ships-grid" id="ships-grid"></div>
  <button class="btn btn-secondary" onclick="showScreen('title')">← Zurück</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../auth.js"></script>
<script>
// LOKALER SPEICHER (Fallback)
function loadData(){try{return JSON.parse(localStorage.getItem('sb_data')||'null')||{coins:0,owned:[0],sel:0};}catch(e){return{coins:0,owned:[0],sel:0};}}
function saveData(d){try{localStorage.setItem('sb_data',JSON.stringify(d));}catch(e){}}

// SPIELERDATEN AUS SUPABASE LADEN
async function initPlayer(){
  try{
    var data=await PZ.loadScore('space-blaster');
    if(data&&data.extra_daten){
      pdata.coins=data.extra_daten.coins||0;
      pdata.owned=data.extra_daten.owned||[0];
      pdata.sel  =data.extra_daten.sel  ||0;
    }
  }catch(e){}
  updateCoinDisplay();
}

// SHIPS
var SHIPS=[
  {name:'Standard',price:0,color:'#5eead4',accent:'#2dd4bf'},
  {name:'Stealth',price:40,color:'#94a3b8',accent:'#64748b'},
  {name:'Phoenix',price:60,color:'#f97316',accent:'#ea580c'},
  {name:'Galaxy',price:80,color:'#a78bfa',accent:'#8b5cf6'},
  {name:'Titan',price:100,color:'#facc15',accent:'#eab308'},
  {name:'Photon',price:120,color:'#f0f0f4',accent:'#e2e8f0'},
];

var pdata=loadData();
var canvas,ctx,CW,CH;
var player,bullets,enemies,particles,powerups;
var score,wave,lives,gameCoins,running,waveTimer,waveActive;
var pwType=null,pwTimer=0;
var gameLoop;
var finalScore=0;

function updateCoinDisplay(){document.getElementById('coin-total').textContent=pdata.coins;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function showLB(){showScreen('lb-screen');document.getElementById('lb-content').innerHTML='<div style="color:var(--text3);font-size:0.85rem;padding:20px;text-align:center;">Lade...</div>';PZ.getLeaderboard('space-blaster').then(renderLB).catch(()=>renderLB([]));}
function showShop(){showScreen('shop-screen');renderShopUI();}

function startGame(){
  showScreen('game-screen');
  canvas=document.getElementById('c');
  CW=Math.min(480,window.innerWidth-20);
  CH=Math.min(680,window.innerHeight-140);
  canvas.width=CW;canvas.height=CH;
  ctx=canvas.getContext('2d');
  player={x:CW/2,y:CH-60,w:28,h:28,speed:4,shooting:false,shootTimer:0};
  bullets=[];enemies=[];particles=[];powerups=[];
  score=0;wave=1;lives=3;gameCoins=0;running=true;waveActive=false;pwType=null;pwTimer=0;
  spawnWave();
  updateHUD();
  if(gameLoop)cancelAnimationFrame(gameLoop);
  tick();
}

function tick(){
  if(!running){return;}
  gameLoop=requestAnimationFrame(tick);
  update();
  draw();
}

function update(){
  // player move
  if(keys['ArrowLeft']||keys['a'])player.x=Math.max(player.w/2,player.x-player.speed);
  if(keys['ArrowRight']||keys['d'])player.x=Math.min(CW-player.w/2,player.x+player.speed);

  // auto shoot
  player.shootTimer++;
  var shootRate=pwType==='triple'?6:12;
  if(player.shootTimer>=shootRate){
    player.shootTimer=0;
    var ship=SHIPS[pdata.sel];
    bullets.push({x:player.x,y:player.y-player.h/2,w:3,h:14,speed:8,color:ship.color,type:'player'});
    if(pwType==='triple'){
      bullets.push({x:player.x-12,y:player.y-player.h/2,w:3,h:14,speed:7,color:ship.color,type:'player',dx:-0.8});
      bullets.push({x:player.x+12,y:player.y-player.h/2,w:3,h:14,speed:7,color:ship.color,type:'player',dx:0.8});
    }
  }

  // bullets
  for(var i=bullets.length-1;i>=0;i--){
    var b=bullets[i];
    b.y-=b.speed;
    if(b.dx)b.x+=b.dx;
    if(b.y<-20||b.y>CH+20||b.x<-20||b.x>CW+20){bullets.splice(i,1);continue;}
    // hit enemies
    if(b.type==='player'){
      var hit=false;
      for(var j=enemies.length-1;j>=0;j--){
        var e=enemies[j];
        if(Math.abs(b.x-e.x)<e.r+4&&Math.abs(b.y-e.y)<e.r+4){
          e.hp--;
          spawnParticles(b.x,b.y,e.color,5);
          bullets.splice(i,1);
          if(e.hp<=0){
            var pts=e.boss?200:e.hp2>1?25:10;
            score+=pts;gameCoins=Math.floor(score/100);
            if(Math.random()<0.18)spawnPowerup(e.x,e.y);
            spawnParticles(e.x,e.y,e.color,e.boss?20:8);
            enemies.splice(j,1);
          }
          hit=true;break;
        }
      }
      if(hit)continue;
    }
    // enemy bullets hit player
    if(b.type==='enemy'){
      if(Math.abs(b.x-player.x)<16&&Math.abs(b.y-player.y)<16){
        bullets.splice(i,1);
        if(pwType==='shield'){pwType=null;continue;}
        lives--;updateHUD();
        spawnParticles(player.x,player.y,'#e85d04',12);
        if(lives<=0){endGame();return;}
        continue;
      }
    }
  }

  // enemies move + shoot
  for(var i=enemies.length-1;i>=0;i--){
    var e=enemies[i];
    e.t=(e.t||0)+0.02;
    e.y+=e.vy;
    e.x+=Math.sin(e.t*e.wave)*e.amp;
    // boss shoots
    if(e.boss){
      e.shootTimer=(e.shootTimer||0)+1;
      if(e.shootTimer%60===0)bullets.push({x:e.x,y:e.y+e.r,w:4,h:10,speed:4,color:'#f43f5e',type:'enemy'});
    }
    // enemy reached bottom
    if(e.y>CH+50){enemies.splice(i,1);lives--;updateHUD();if(lives<=0){endGame();return;}}
  }

  // powerups
  for(var i=powerups.length-1;i>=0;i--){
    var p=powerups[i];
    p.y+=1.5;
    if(Math.abs(p.x-player.x)<20&&Math.abs(p.y-player.y)<20){activatePW(p.type);powerups.splice(i,1);continue;}
    if(p.y>CH+20)powerups.splice(i,1);
  }

  // pw timer
  if(pwType&&pwType!=='shield'){pwTimer--;if(pwTimer<=0)pwType=null;}

  // next wave
  if(enemies.length===0&&waveActive){
    waveActive=false;wave++;
    setTimeout(()=>{spawnWave();},1500);
  }

  updateHUD();
}

function spawnWave(){
  waveActive=true;
  var count=4+wave*2;
  var boss=wave%5===0;
  if(boss){
    enemies.push({x:CW/2,y:-60,r:30,vy:0.6,amp:40,wave:1,color:'#f43f5e',hp:8+wave,hp2:8+wave,boss:true,shootTimer:0});
    count=Math.floor(count*0.4);
  }
  for(var i=0;i<count;i++){
    var row=Math.floor(i/4);
    var col=i%4;
    var cols=Math.min(count,4);
    enemies.push({
      x:CW*(0.15+col*0.7/(cols-1||1)),
      y:-40-row*50,
      r:10+Math.random()*4,
      vy:0.4+wave*0.05,
      amp:20+wave*5,
      wave:0.5+Math.random(),
      color:['#818cf8','#38bdf8','#a78bfa','#34d399'][Math.floor(Math.random()*4)],
      hp:wave>3?2:1,hp2:wave>3?2:1,boss:false
    });
  }
}

function spawnPowerup(x,y){
  var types=['triple','shield','speed'];
  powerups.push({x,y,type:types[Math.floor(Math.random()*types.length)]});
}

function activatePW(t){
  pwType=t;
  if(t==='speed'){player.speed=7;pwTimer=300;setTimeout(()=>{player.speed=4;},5000);}
  else pwTimer=300;
}

function spawnParticles(x,y,color,n){
  for(var i=0;i<n;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:1,color});
  }
}

function draw(){
  ctx.fillStyle='#080810';ctx.fillRect(0,0,CW,CH);
  // stars
  ctx.fillStyle='rgba(255,255,255,0.3)';
  for(var i=0;i<60;i++){
    var sx=(i*137+Date.now()*0.01)%CW;
    var sy=(i*97+Date.now()*0.02)%CH;
    ctx.fillRect(sx,sy,1,1);
  }

  // powerups
  var pwEmoji={'triple':'◉','shield':'◈','speed':'◆'};
  var pwColors={'triple':'#38bdf8','shield':'#34d399','speed':'#fbbf24'};
  powerups.forEach(p=>{
    ctx.fillStyle=pwColors[p.type];ctx.font='18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pwEmoji[p.type],p.x,p.y);
  });

  // enemies
  enemies.forEach(e=>{
    ctx.save();
    ctx.fillStyle=e.color;
    if(e.boss){
      ctx.shadowColor=e.color;ctx.shadowBlur=16;
      ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.arc(e.x,e.y,e.r*0.5,0,Math.PI*2);ctx.fill();
      // hp bar
      ctx.fillStyle='#1a1a1f';ctx.fillRect(e.x-e.r,e.y+e.r+4,e.r*2,5);
      ctx.fillStyle=e.color;ctx.fillRect(e.x-e.r,e.y+e.r+4,(e.hp/e.hp2)*e.r*2,5);
    } else {
      ctx.beginPath();
      ctx.moveTo(e.x,e.y-e.r);
      ctx.lineTo(e.x+e.r*0.7,e.y+e.r*0.7);
      ctx.lineTo(e.x-e.r*0.7,e.y+e.r*0.7);
      ctx.closePath();ctx.fill();
    }
    ctx.restore();
  });

  // bullets
  bullets.forEach(b=>{
    ctx.fillStyle=b.type==='player'?SHIPS[pdata.sel].color:'#f43f5e';
    ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
  });

  // particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.92;p.vy*=0.92;p.life-=0.06;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.fillRect(p.x-2,p.y-2,4,4);
    ctx.globalAlpha=1;
  }

  // player ship
  var ship=SHIPS[pdata.sel];
  ctx.save();
  ctx.fillStyle=ship.color;
  ctx.shadowColor=ship.color;ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.moveTo(player.x,player.y-player.h/2);
  ctx.lineTo(player.x+player.w/2,player.y+player.h/2);
  ctx.lineTo(player.x+player.w*0.3,player.y+player.h*0.3);
  ctx.lineTo(player.x-player.w*0.3,player.y+player.h*0.3);
  ctx.lineTo(player.x-player.w/2,player.y+player.h/2);
  ctx.closePath();ctx.fill();
  // shield ring
  if(pwType==='shield'){
    ctx.strokeStyle='rgba(52,211,153,0.7)';ctx.lineWidth=2;ctx.shadowColor='#34d399';ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(player.x,player.y,24,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();

  // wave banner
  if(!waveActive&&enemies.length===0){
    ctx.fillStyle='rgba(12,12,15,0.7)';ctx.fillRect(0,CH/2-24,CW,48);
    ctx.fillStyle=ship.color;ctx.font='bold 20px Syne, sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('WELLE '+(wave)+' KLAR!',CW/2,CH/2);
  }
}

function updateHUD(){
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-wave').textContent=wave;
  document.getElementById('hud-coins').textContent=gameCoins;
  var lhtml='';for(var i=0;i<3;i++)lhtml+='<div class="life'+(i>=lives?' lost':'')+'"></div>';
  document.getElementById('hud-lives').innerHTML=lhtml;
  var pwLabels={triple:'◉ Triple Shot',shield:'◈ Schild',speed:'◆ Speed'};
  document.getElementById('pw-bar').textContent=pwType?(pwLabels[pwType]||''):'';
}

function endGame(){
  running=false;cancelAnimationFrame(gameLoop);
  finalScore=score;
  pdata.coins+=gameCoins;saveData(pdata);updateCoinDisplay();
  // Supabase speichern (asynchron)
  if(typeof PZ!=='undefined'){
    PZ.saveGameData('space-blaster',score,wave,{coins:pdata.coins,owned:pdata.owned,sel:pdata.sel}).catch(()=>{});
    PZ.getUser().then(u=>{var h=document.getElementById('login-hint');if(h)h.style.display=u?'none':'flex';}).catch(()=>{});
  }
  document.getElementById('res-score').textContent=score;
  document.getElementById('res-wave').textContent=wave;
  document.getElementById('res-coins').textContent=gameCoins;
  document.getElementById('wave-reached').textContent='Welle '+wave+' erreicht';
  showScreen('gameover');
}


function renderLB(lb){
  var m=['🥇','🥈','🥉'];
  var h='<table class="lb-table"><thead><tr><th>#</th><th>Name</th><th>Punkte</th></tr></thead><tbody>';
  if(!lb||!lb.length)h+='<tr><td colspan="3" class="lb-empty">Noch keine Einträge</td></tr>';
  else lb.forEach((e,i)=>{h+='<tr><td class="lb-rank '+(i<3?['g','s','b'][i]:'')+'">'+(m[i]||i+1)+'</td><td class="lb-name">'+(e.benutzername||e.name||'?')+'</td><td class="lb-score">'+(e.punkte||0)+'</td></tr>';});
  h+='</tbody></table>';
  document.getElementById('lb-content').innerHTML=h;
}

function renderShopUI(){
  document.getElementById('shop-coins').textContent=pdata.coins;
  var h='';
  SHIPS.forEach((s,i)=>{
    var owned=pdata.owned.includes(i),sel=pdata.sel===i;
    h+='<div class="ship-card'+(sel?' sel':'')+(owned?'':' locked')+'" onclick="buyShip('+i+')">';
    h+='<div class="ship-preview"><svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="22,4 38,38 28,30 16,30 6,38" fill="'+s.color+'"/><circle cx="22" cy="22" r="6" fill="'+s.accent+'"/></svg></div>';
    h+='<div class="ship-name">'+s.name+'</div>';
    h+='<div class="ship-price '+(sel?'owned':owned?'owned':'cost')+'">'+(sel?'Aktiv':owned?'✓ Wählen':'🪙 '+s.price)+'</div>';
    h+='</div>';
  });
  document.getElementById('ships-grid').innerHTML=h;
}

function buyShip(i){
  if(pdata.owned.includes(i)){pdata.sel=i;saveData(pdata);renderShopUI();return;}
  if(pdata.coins>=SHIPS[i].price){pdata.coins-=SHIPS[i].price;pdata.owned.push(i);pdata.sel=i;saveData(pdata);renderShopUI();updateCoinDisplay();}
}

// KEYS
var keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

updateCoinDisplay();
if(typeof PZ!=='undefined')initPlayer();
</script>
</body>
</html>
