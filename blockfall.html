<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blockfall — PIXELZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0f;--s1:#131316;--s2:#1a1a1f;--s3:#222228;--s4:#2c2c34;--border:rgba(255,255,255,0.07);--accent:#e85d04;--accent-h:#fb8c3a;--text:#f0f0f4;--text2:#9090a8;--text3:#52525e;--r:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Figtree',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;user-select:none}
a.back{position:fixed;top:14px;left:14px;font-family:'Figtree',sans-serif;font-weight:600;font-size:0.8rem;color:var(--text3);text-decoration:none;z-index:100;transition:color .15s}
a.back:hover{color:var(--text)}
.coins-hud{position:fixed;top:14px;right:14px;font-family:'Figtree',sans-serif;font-weight:700;font-size:0.85rem;color:var(--text2);z-index:100}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.screen.hidden{display:none}
.btn{font-family:'Figtree',sans-serif;font-weight:700;font-size:0.9rem;padding:12px 0;border-radius:8px;cursor:pointer;transition:all .15s;width:200px;text-align:center;border:none;letter-spacing:0.02em}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-secondary{background:var(--s2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--s3);color:var(--text)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* TITLE */
#title-screen .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3rem);color:var(--text);letter-spacing:-0.02em;margin-bottom:4px}
#title-screen .sub{font-family:'Figtree',sans-serif;font-size:0.8rem;font-weight:600;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:36px}

/* GAME LAYOUT */
#game-screen{flex-direction:row;gap:14px;align-items:flex-start;justify-content:center;padding-top:70px}
.side-panel{width:88px;display:flex;flex-direction:column;gap:10px}
.panel-box{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.panel-label{font-family:'Figtree',sans-serif;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:6px}
.panel-val{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;color:var(--text)}
.panel-val.orange{color:var(--accent-h)}
canvas#preview-hold,canvas#preview-next{display:block;margin:0 auto}
#board-wrap{position:relative}
canvas#board{display:block;border:1px solid var(--border);border-radius:6px}
#announce{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--accent-h);pointer-events:none;opacity:0;transition:opacity .15s;text-align:center;white-space:nowrap;letter-spacing:-0.01em}

/* GAMEOVER */
#gameover-screen .go-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:var(--accent);letter-spacing:-0.02em;margin-bottom:20px}
.result-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px 40px;margin-bottom:14px;min-width:280px}
.result-row{display:flex;justify-content:space-between;gap:40px;margin-bottom:8px;align-items:center}
.result-row:last-child{margin-bottom:0}
.rl{font-size:0.85rem;font-weight:600;color:var(--text2)}.rv{font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;color:var(--text)}
.name-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px}
.name-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3)}
input.name-inp{background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:'Figtree',sans-serif;font-size:0.9rem;font-weight:600;padding:10px 16px;border-radius:8px;text-align:center;width:200px;outline:none;text-transform:uppercase;transition:border-color .15s}
input.name-inp:focus{border-color:var(--accent)}

/* LB */
#lb-screen .lb-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;color:var(--text);margin-bottom:20px}
.lb-table{width:320px;border-collapse:collapse}
.lb-table th{font-family:'Figtree',sans-serif;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);padding:8px;border-bottom:1px solid var(--border);text-align:left}
.lb-table td{font-family:'Figtree',sans-serif;font-size:0.9rem;font-weight:600;padding:8px;border-bottom:1px solid rgba(255,255,255,0.04)}
.lb-rank{color:var(--text3);width:32px}.lb-rank.g{color:#f0a500}.lb-rank.s{color:#a0a0b8}.lb-rank.b{color:#9a6a3a}
.lb-name{color:var(--text)}.lb-score{color:var(--accent-h);text-align:right;font-family:'Syne',sans-serif}
.lb-empty{text-align:center;padding:20px;color:var(--text3);font-size:0.8rem}

/* SHOP */
#shop-screen .shop-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem;color:var(--text);margin-bottom:4px}
.shop-balance{font-size:0.8rem;font-weight:600;color:var(--text3);margin-bottom:20px}
.themes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.theme-card{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s}
.theme-card:hover{border-color:rgba(255,255,255,0.14)}
.theme-card.selected{border-color:rgba(232,93,4,0.5);background:rgba(232,93,4,0.05)}
.theme-card.locked{opacity:0.45}
.theme-preview{display:flex;gap:4px;justify-content:center;margin-bottom:8px}
.theme-block{width:13px;height:13px;border-radius:3px}
.theme-name{font-family:'Figtree',sans-serif;font-size:0.72rem;font-weight:700;color:var(--text);margin-bottom:5px}
.theme-price{font-family:'Figtree',sans-serif;font-size:0.72rem;font-weight:600}
.theme-price.owned{color:#4ade80}.theme-price.cost{color:var(--text2)}
</style>
</head>
<body>
<a href="index.html" class="back">← PIXELZONE</a>
<div class="coins-hud">🪙 <span id="coin-total">0</span></div>

<div class="screen" id="title-screen">
  <div class="logo">Blockfall</div>
  <div class="sub">// Pixelzone Arcade</div>
  <button class="btn btn-primary" onclick="startGame()">▶ Spielen</button>
  <button class="btn btn-secondary" onclick="showLB()">Rangliste</button>
  <button class="btn btn-secondary" onclick="showShop()">Shop</button>
</div>

<div class="screen hidden" id="game-screen">
  <div class="side-panel" id="left-panel">
    <div class="panel-box">
      <div class="panel-label">Hold</div>
      <canvas id="preview-hold" width="70" height="60"></canvas>
    </div>
    <div class="panel-box">
      <div class="panel-label">Punkte</div>
      <div class="panel-val orange" id="hud-score">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Münzen</div>
      <div class="panel-val" id="hud-coins">0</div>
    </div>
  </div>
  <div id="board-wrap">
    <canvas id="board"></canvas>
    <div id="announce"></div>
  </div>
  <div class="side-panel" id="right-panel">
    <div class="panel-box">
      <div class="panel-label">Nächste</div>
      <canvas id="preview-next" width="70" height="160"></canvas>
    </div>
    <div class="panel-box">
      <div class="panel-label">Level</div>
      <div class="panel-val" id="hud-level">1</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Reihen</div>
      <div class="panel-val" id="hud-lines">0</div>
    </div>
  </div>
</div>

<div class="screen hidden" id="gameover-screen">
  <div class="go-title">Game Over</div>
  <div class="result-box">
    <div class="result-row"><span class="rl">Punkte</span><span class="rv" id="res-score">0</span></div>
    <div class="result-row"><span class="rl">Level</span><span class="rv" id="res-level">1</span></div>
    <div class="result-row"><span class="rl">Reihen</span><span class="rv" id="res-lines">0</span></div>
    <div class="result-row"><span class="rl">Münzen verdient</span><span class="rv" id="res-coins">0</span></div>
  </div>
  <div class="name-wrap" id="name-wrap">
    <div class="name-label">Name für Rangliste</div>
    <input class="name-inp" id="name-inp" maxlength="12" placeholder="DEIN NAME"/>
    <button class="btn btn-primary" onclick="submitScore()">Eintragen</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="startGame()">Nochmal</button>
    <button class="btn btn-secondary" onclick="showLB()">Rangliste</button>
    <button class="btn btn-secondary" onclick="showShop()">Shop</button>
  </div>
</div>

<div class="screen hidden" id="lb-screen">
  <div class="lb-title">🏆 Rangliste</div>
  <div id="lb-content"></div>
  <button class="btn btn-secondary" style="margin-top:18px" onclick="showScreen('title-screen')">← Zurück</button>
</div>

<div class="screen hidden" id="shop-screen">
  <div class="shop-title">Shop</div>
  <div class="shop-balance">🪙 <span id="shop-coins">0</span> Münzen</div>
  <div class="themes-grid" id="themes-grid"></div>
  <button class="btn btn-secondary" onclick="showScreen('title-screen')">← Zurück</button>
</div>

<script>
var BIN_ID='69c8fa74ed015c742bc8e416';
var BIN_KEY='$2a$10$xwN4exdBlvLZoIzDDvZClewvqjRkJpa7/onN2TbkOAOXoRWqdg0yu';
var BIN_URL='https://api.jsonbin.io/v3/b/'+BIN_ID;

function loadData(){try{return JSON.parse(localStorage.getItem('blockfall_data')||'null')||{coins:0,owned:[0],sel:0};}catch(e){return{coins:0,owned:[0],sel:0};}}
function saveData(d){try{localStorage.setItem('blockfall_data',JSON.stringify(d));}catch(e){}}
function loadLBLocal(){try{return JSON.parse(localStorage.getItem('blockfall_lb')||'[]');}catch(e){return[];}}
function saveLBLocal(d){try{localStorage.setItem('blockfall_lb',JSON.stringify(d));}catch(e){}}
function withTO(p,ms){return Promise.race([p,new Promise((_,rej)=>setTimeout(()=>rej(new Error('to')),ms))]);}
function fetchLB(){return withTO(fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':BIN_KEY}}).then(r=>r.json()).then(d=>{var lb=d.record;if(!Array.isArray(lb))lb=[];saveLBLocal(lb);return lb;}),4000).catch(()=>loadLBLocal());}
function saveLBEntry(name,score){var lb=loadLBLocal();lb.push({name:name.toUpperCase().slice(0,12),score});lb.sort((a,b)=>b.score-a.score);lb=lb.slice(0,10);saveLBLocal(lb);withTO(fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},body:JSON.stringify(lb)}),4000).catch(()=>{});}

var THEMES=[
  {name:'Neon',price:0,colors:['#22d3ee','#f472b6','#fbbf24','#4ade80','#f97316','#a78bfa','#f0f0f4']},
  {name:'Pastell',price:30,colors:['#bae6fd','#fbcfe8','#fef08a','#bbf7d0','#fed7aa','#ddd6fe','#ffffff']},
  {name:'Feuer',price:50,colors:['#ef4444','#f97316','#fbbf24','#dc2626','#ea580c','#ca8a04','#fde047']},
  {name:'Ozean',price:40,colors:['#0ea5e9','#06b6d4','#3b82f6','#0284c7','#0891b2','#2563eb','#38bdf8']},
  {name:'Candy',price:60,colors:['#ec4899','#a855f7','#f43f5e','#8b5cf6','#db2777','#7c3aed','#e879f9']},
  {name:'Matrix',price:80,colors:['#16a34a','#15803d','#22c55e','#14532d','#166534','#4ade80','#86efac']},
];

var PIECES=[
  {shape:[[1,1,1,1]],idx:0},
  {shape:[[1,1],[1,1]],idx:1},
  {shape:[[0,1,0],[1,1,1]],idx:2},
  {shape:[[1,0,0],[1,1,1]],idx:3},
  {shape:[[0,0,1],[1,1,1]],idx:4},
  {shape:[[0,1,1],[1,1,0]],idx:5},
  {shape:[[1,1,0],[0,1,1]],idx:6},
];

var COLS=10,ROWS=20,CELL=28;
var board,cur,curX,curY,held,heldUsed,bag,nextPieces;
var score,level,lines,gameCoins,running,dropTimer,dropInterval;
var pdata=loadData();
var comboCount=0,btbTetris=false;

function updateCoinDisplay(){document.getElementById('coin-total').textContent=pdata.coins;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function showLB(){showScreen('lb-screen');fetchLB().then(renderLB);}
function showShop(){showScreen('shop-screen');renderShopUI();}

function emptyBoard(){return Array.from({length:ROWS},()=>Array(COLS).fill(0));}

function startGame(){
  showScreen('game-screen');
  var bw=document.getElementById('board');
  bw.width=COLS*CELL;bw.height=ROWS*CELL;
  board=emptyBoard();
  score=0;level=1;lines=0;gameCoins=0;
  held=null;heldUsed=false;running=true;comboCount=0;btbTetris=false;
  bag=[];nextPieces=[];
  while(nextPieces.length<3)nextPieces.push(randomPiece());
  spawnPiece();
  if(dropTimer)clearInterval(dropTimer);
  dropInterval=getDropInterval();
  dropTimer=setInterval(()=>{if(running)drop();},dropInterval);
  updateHUD();drawAll();
}

function getDropInterval(){return Math.max(80,600-level*50);}

function randomPiece(){
  if(!bag.length){bag=[0,1,2,3,4,5,6];for(let i=bag.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[bag[i],bag[j]]=[bag[j],bag[i]];}}
  return JSON.parse(JSON.stringify(PIECES[bag.pop()]));
}

function spawnPiece(){
  cur=nextPieces.shift();
  nextPieces.push(randomPiece());
  curX=Math.floor((COLS-cur.shape[0].length)/2);
  curY=0;heldUsed=false;
  if(collides(cur.shape,curX,curY)){endGame();}
  drawAll();
}

function collides(shape,ox,oy){
  for(var r=0;r<shape.length;r++)for(var c=0;c<shape[r].length;c++){
    if(!shape[r][c])continue;
    var nx=ox+c,ny=oy+r;
    if(nx<0||nx>=COLS||ny>=ROWS)return true;
    if(ny>=0&&board[ny][nx])return true;
  }
  return false;
}

function drop(){
  if(!running)return;
  curY++;
  if(collides(cur.shape,curX,curY)){curY--;lock();}
  else drawAll();
}

function hardDrop(){
  var y=curY;
  while(!collides(cur.shape,curX,y+1))y++;
  score+=2*(y-curY);curY=y;lock();
}

function lock(){
  for(var r=0;r<cur.shape.length;r++)for(var c=0;c<cur.shape[r].length;c++){
    if(cur.shape[r][c]&&curY+r>=0)board[curY+r][curX+c]=cur.idx+1;
  }
  var cleared=clearLines();
  if(cleared>0){
    comboCount++;
    var pts=0;
    if(cleared===1)pts=100;
    else if(cleared===2)pts=300;
    else if(cleared===3)pts=500;
    else{pts=800;announce(btbTetris?'BACK-TO-BACK!':'TETRIS!');btbTetris=true;}
    if(cleared<4)btbTetris=false;
    pts*=level;
    if(comboCount>1){pts=Math.floor(pts*(1+comboCount*0.3));if(comboCount>=2)announce('COMBO x'+comboCount+'!');}
    score+=pts;lines+=cleared;
    var newLevel=Math.floor(lines/10)+1;
    if(newLevel>level){level=newLevel;clearInterval(dropTimer);dropTimer=setInterval(()=>{if(running)drop();},getDropInterval());}
    gameCoins=Math.floor(score/500);
  } else{comboCount=0;}
  updateHUD();spawnPiece();
}

function clearLines(){
  var count=0;
  for(var r=ROWS-1;r>=0;r--){
    if(board[r].every(c=>c)){board.splice(r,1);board.unshift(Array(COLS).fill(0));count++;r++;}
  }
  return count;
}

function rotateCW(shape){
  var rows=shape.length,cols=shape[0].length;
  var out=Array.from({length:cols},()=>Array(rows).fill(0));
  for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)out[c][rows-1-r]=shape[r][c];
  return out;
}

function tryRotate(){
  var rot=rotateCW(cur.shape);
  var kicks=[0,-1,1,-2,2];
  for(var k of kicks){if(!collides(rot,curX+k,curY)){cur.shape=rot;curX+=k;drawAll();return;}}
}

function holdPiece(){
  if(heldUsed)return;heldUsed=true;
  if(held){var tmp=held;held=cur;cur=tmp;}
  else{held=cur;spawnPiece();return;}
  curX=Math.floor((COLS-cur.shape[0].length)/2);curY=0;
  if(collides(cur.shape,curX,curY)){endGame();}
  drawAll();
}

function getGhostY(){var gy=curY;while(!collides(cur.shape,curX,gy+1))gy++;return gy;}

var boardCanvas=null,bctx=null;
function drawAll(){
  if(!boardCanvas)boardCanvas=document.getElementById('board');
  if(!bctx)bctx=boardCanvas.getContext('2d');
  var theme=THEMES[pdata.sel];
  bctx.fillStyle='#09090c';bctx.fillRect(0,0,boardCanvas.width,boardCanvas.height);
  bctx.strokeStyle='rgba(255,255,255,0.03)';bctx.lineWidth=1;
  for(var x=0;x<=COLS;x++){bctx.beginPath();bctx.moveTo(x*CELL,0);bctx.lineTo(x*CELL,ROWS*CELL);bctx.stroke();}
  for(var y=0;y<=ROWS;y++){bctx.beginPath();bctx.moveTo(0,y*CELL);bctx.lineTo(COLS*CELL,y*CELL);bctx.stroke();}
  for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){
    if(board[r][c])drawBlock(bctx,c*CELL,r*CELL,theme.colors[(board[r][c]-1)%theme.colors.length],0.85);
  }
  if(!running)return;
  var gy=getGhostY();
  for(var r=0;r<cur.shape.length;r++)for(var c=0;c<cur.shape[r].length;c++){
    if(cur.shape[r][c]){
      bctx.fillStyle='rgba(255,255,255,0.06)';
      bctx.strokeStyle=theme.colors[cur.idx%theme.colors.length];
      bctx.lineWidth=1;bctx.globalAlpha=0.5;
      bctx.fillRect(curX*CELL+c*CELL+1,(gy+r)*CELL+1,CELL-2,CELL-2);
      bctx.strokeRect(curX*CELL+c*CELL+1,(gy+r)*CELL+1,CELL-2,CELL-2);
      bctx.globalAlpha=1;
    }
  }
  for(var r=0;r<cur.shape.length;r++)for(var c=0;c<cur.shape[r].length;c++){
    if(cur.shape[r][c])drawBlock(bctx,(curX+c)*CELL,(curY+r)*CELL,theme.colors[cur.idx%theme.colors.length],1);
  }
  drawPreview('preview-hold',held);
  drawPreviewList();
}

function drawBlock(ctx,x,y,color,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.fillStyle=color;
  ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
  ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fillRect(x+2,y+2,CELL-4,4);
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(x+1,y+CELL-4,CELL-2,3);
  ctx.restore();
}

function drawPreview(id,piece){
  var c=document.getElementById(id);if(!c)return;
  var ctx=c.getContext('2d');
  ctx.fillStyle='#09090c';ctx.fillRect(0,0,c.width,c.height);
  if(!piece)return;
  var theme=THEMES[pdata.sel];
  var sz=12,offX=Math.floor((c.width-piece.shape[0].length*sz)/2),offY=Math.floor((c.height-piece.shape.length*sz)/2);
  for(var r=0;r<piece.shape.length;r++)for(var col=0;col<piece.shape[r].length;col++){
    if(piece.shape[r][col]){ctx.fillStyle=theme.colors[piece.idx%theme.colors.length];ctx.fillRect(offX+col*sz+1,offY+r*sz+1,sz-2,sz-2);}
  }
}

function drawPreviewList(){
  var c=document.getElementById('preview-next');if(!c)return;
  var ctx=c.getContext('2d');
  ctx.fillStyle='#09090c';ctx.fillRect(0,0,c.width,c.height);
  var theme=THEMES[pdata.sel];
  var sz=11,yOff=4;
  nextPieces.slice(0,3).forEach(function(piece){
    var offX=Math.floor((c.width-piece.shape[0].length*sz)/2);
    for(var r=0;r<piece.shape.length;r++)for(var col=0;col<piece.shape[r].length;col++){
      if(piece.shape[r][col]){ctx.fillStyle=theme.colors[piece.idx%theme.colors.length];ctx.fillRect(offX+col*sz+1,yOff+r*sz+1,sz-2,sz-2);}
    }
    yOff+=piece.shape.length*sz+10;
  });
}

function updateHUD(){
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-level').textContent=level;
  document.getElementById('hud-lines').textContent=lines;
  document.getElementById('hud-coins').textContent=gameCoins;
}

var announceTO=null;
function announce(text){
  var el=document.getElementById('announce');
  el.textContent=text;el.style.opacity='1';
  if(announceTO)clearTimeout(announceTO);
  announceTO=setTimeout(()=>{el.style.opacity='0';},1200);
}

function endGame(){
  running=false;clearInterval(dropTimer);
  pdata.coins+=gameCoins;saveData(pdata);updateCoinDisplay();
  document.getElementById('res-score').textContent=score;
  document.getElementById('res-level').textContent=level;
  document.getElementById('res-lines').textContent=lines;
  document.getElementById('res-coins').textContent=gameCoins;
  var lb=loadLBLocal();
  var top10=lb.length<10||score>(lb[lb.length-1]||{score:0}).score;
  document.getElementById('name-wrap').style.display=top10&&score>0?'flex':'none';
  showScreen('gameover-screen');
}

function submitScore(){var name=document.getElementById('name-inp').value.trim()||'AAA';saveLBEntry(name,score);document.getElementById('name-wrap').style.display='none';}

function renderLB(lb){
  var m=['🥇','🥈','🥉'];
  var h='<table class="lb-table"><thead><tr><th>#</th><th>Name</th><th>Punkte</th></tr></thead><tbody>';
  if(!lb.length||lb.every(e=>e.score===0))h+='<tr><td colspan="3" class="lb-empty">Noch keine Einträge</td></tr>';
  else lb.filter(e=>e.score>0).forEach((e,i)=>{h+='<tr><td class="lb-rank '+(i<3?['g','s','b'][i]:'')+'">'+(m[i]||i+1)+'</td><td class="lb-name">'+e.name+'</td><td class="lb-score">'+e.score+'</td></tr>';});
  h+='</tbody></table>';document.getElementById('lb-content').innerHTML=h;
}

function renderShopUI(){
  document.getElementById('shop-coins').textContent=pdata.coins;
  var h='';
  THEMES.forEach(function(t,i){
    var owned=pdata.owned.includes(i),sel=pdata.sel===i;
    h+='<div class="theme-card'+(sel?' selected':'')+(owned?'':' locked')+'" onclick="buyTheme('+i+')">';
    h+='<div class="theme-preview">';
    t.colors.slice(0,4).forEach(c=>{h+='<div class="theme-block" style="background:'+c+'"></div>';});
    h+='</div>';
    h+='<div class="theme-name">'+t.name+'</div>';
    h+='<div class="theme-price '+(sel?'owned':owned?'owned':'cost')+'">'+(sel?'Aktiv':owned?'✓ Wählen':'🪙 '+t.price)+'</div>';
    h+='</div>';
  });
  document.getElementById('themes-grid').innerHTML=h;
}

function buyTheme(i){
  if(pdata.owned.includes(i)){pdata.sel=i;saveData(pdata);renderShopUI();return;}
  if(pdata.coins>=THEMES[i].price){pdata.coins-=THEMES[i].price;pdata.owned.push(i);pdata.sel=i;saveData(pdata);renderShopUI();updateCoinDisplay();}
}

var dasKey=null,dasTimer=null,dasRepeat=null;
document.addEventListener('keydown',function(e){
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();
  if(e.key==='ArrowLeft'){move(-1);}
  else if(e.key==='ArrowRight'){move(1);}
  else if(e.key==='ArrowUp'||e.key==='x'||e.key==='X'){tryRotate();}
  else if(e.key==='ArrowDown'){drop();}
  else if(e.key===' '){hardDrop();}
  else if(e.key==='Shift'||e.key==='c'||e.key==='C'){holdPiece();}
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    if(dasKey!==e.key){dasKey=e.key;clearTimeout(dasTimer);clearInterval(dasRepeat);dasTimer=setTimeout(()=>{dasRepeat=setInterval(()=>{move(e.key==='ArrowLeft'?-1:1);},50);},160);}
  }
});
document.addEventListener('keyup',function(e){if(e.key===dasKey){dasKey=null;clearTimeout(dasTimer);clearInterval(dasRepeat);}});

function move(dx){if(!running)return;if(!collides(cur.shape,curX+dx,curY)){curX+=dx;drawAll();}}

updateCoinDisplay();
</script>
</body>
</html>
